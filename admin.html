<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <title>Admin — StaxAI</title>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/staxai-auth.css">
  <style>
    .admin-container { max-width: var(--page-max-width); margin: 0 auto; padding: var(--page-padding); }

    /* Section container */
    .admin-section { display: flex; flex-direction: column; gap: 16px; }
    .admin-section-placeholder {
      padding: 48px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: var(--note-font-size);
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
    }

    /* Metric grids — used by Dashboard Overview and Revenue */
    .admin-metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .admin-stat-trend { font-size: var(--note-font-size); color: var(--text-muted); margin-top: 4px; }
    .admin-stat-trend.up { color: var(--green); }
    .admin-stat-trend.down { color: var(--red); }

    /* Quick lists — recent signups, top tools, industry breakdown */
    .admin-list-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .admin-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: var(--note-font-size);
    }
    .admin-list-item:last-child { border-bottom: none; }
    .admin-list-item-label { color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .admin-list-item-value { color: var(--text-muted); font-weight: var(--font-weight-semibold); flex-shrink: 0; margin-left: 12px; }

    /* Tables */
    .admin-table-wrap {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: auto;
    }
    table.admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--note-font-size);
      font-family: var(--body-font);
    }
    table.admin-table thead th {
      text-align: left;
      padding: 10px 14px;
      background: var(--bg-subtle);
      border-bottom: 1px solid var(--border);
      font-size: var(--badge-font-size);
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-label);
      white-space: nowrap;
    }
    table.admin-table tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: top;
    }
    table.admin-table tbody tr:last-child td { border-bottom: none; }
    table.admin-table tbody tr.clickable { cursor: pointer; }
    table.admin-table tbody tr.clickable:hover { background: var(--bg-subtle); }

    /* Cards default to overflow:hidden so their rounded corners clip
       child content. The Manual Tracking card on the Profitability
       section and the customer filter / customer detail flow on the
       Customers tab all contain .lookback-dropdown menus that open
       downward and would otherwise be clipped. Mirror the
       news-digest-settings pattern used by #tab-team in this file. */
    #tab-overview .prof-manual-card,
    #tab-customers .settings-card { overflow: visible; }

    /* Filters — Customers tab. Mirrors the cl-review filter rhythm:
       a search row at top, a row of toggle buttons + Clear All below
       it, and a hidden pill row that the toggle buttons reveal. */
    .admin-filter-search-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 14px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
    }
    .admin-filter-search-row .form-input { width: auto; min-width: 160px; }
    .admin-filter-search-row #cust-search { flex: 1 1 240px; min-width: 240px; }
    .admin-filter-label {
      font-size: var(--badge-font-size);
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-label);
      align-self: center;
      margin-right: 4px;
    }
    .admin-filter-btns-row { display: flex; align-items: center; gap: 8px; padding: 12px 0 0 0; flex-wrap: wrap; }
    .admin-filter-row { margin: 12px 0 0 0; padding: 12px 16px; background: var(--white); border: 1px solid var(--border); border-radius: var(--card-radius); }
    .admin-filter-row > div { margin-bottom: 8px; }
    .admin-filter-row > div:last-child { margin-bottom: 0; }

    /* Manual entry form — API Cost Tracker */
    .admin-entry-form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 14px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
    }
    .admin-entry-form .form-input { width: auto; min-width: 140px; }
    .api-provider-wrap .lookback-dropdown { min-width: 200px; }

    /* Provider cards — API Cost Tracker */
    .admin-provider-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }
    .admin-provider-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 4px solid var(--blue);
      border-radius: var(--card-radius);
      padding: 16px 20px;
    }
    .admin-provider-card.warn { border-left-color: var(--orange); }
    .admin-provider-name { font-size: var(--section-title-font-size); font-weight: var(--font-weight-semibold); color: var(--text); margin-bottom: 4px; }
    .admin-provider-purpose { font-size: var(--note-font-size); color: var(--text-muted); margin-bottom: 12px; }
    .admin-provider-row { display: flex; justify-content: space-between; font-size: var(--note-font-size); padding: 4px 0; }
    .admin-provider-row .label { color: var(--text-muted); }

    /* Service status row — Infrastructure */
    .admin-status-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
    .admin-status-name { flex: 1; }
    .admin-status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--grey); }
    .admin-status-dot.up { background: var(--green); }
    .admin-status-dot.warn { background: var(--orange); }
    .admin-status-dot.down { background: var(--red); }

    /* Customer detail modal */
    .admin-modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--modal-overlay-bg);
      z-index: 1000;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
    }
    .admin-modal-overlay.open { display: flex; }
    .admin-modal-card {
      background: var(--white);
      border-radius: var(--card-radius);
      max-width: 720px;
      width: 100%;
      box-shadow: 0 8px 32px var(--shadow-card);
    }
    .admin-modal-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .admin-modal-title { font-family: var(--heading-font); font-size: var(--heading-lg-size); font-weight: var(--heading-lg-weight); color: var(--text); }
    .admin-modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted); line-height: 1; }
    .admin-modal-body { padding: 18px 24px; }
    .admin-detail-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: var(--note-font-size);
    }
    .admin-detail-row:last-child { border-bottom: none; }
    .admin-detail-label { color: var(--text-muted); flex-shrink: 0; }
    .admin-detail-value { color: var(--text); text-align: right; word-break: break-word; }

    /* Note text — used when a feature isn't fully wired (tool_usage etc.) */
    .admin-note { font-size: var(--note-font-size); color: var(--text-muted); padding: 8px 12px; background: var(--bg-subtle); border-radius: var(--btn-radius); }

    /* Loading / empty states */
    .admin-loading { padding: 24px; color: var(--text-muted); text-align: center; font-size: var(--note-font-size); }
    .admin-empty { padding: 24px; color: var(--text-muted); text-align: center; font-size: var(--note-font-size); }

    /* Profitability & Costs — Dashboard Overview section */
    .prof-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .prof-supplier-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .prof-supplier-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 14px 16px;
    }
    .prof-supplier-card.warn { border-left: 4px solid var(--orange); }
    .prof-supplier-card.alert { border-left: 4px solid var(--red); }
    .prof-supplier-name {
      font-weight: var(--font-weight-semibold);
      font-size: var(--note-font-size);
      color: var(--text);
      text-transform: capitalize;
      margin-bottom: 6px;
    }
    .prof-supplier-cost { font-size: var(--section-title-font-size); color: var(--text); font-weight: var(--font-weight-semibold); }
    .prof-supplier-trend { font-size: var(--badge-font-size); color: var(--text-muted); margin-top: 2px; }
    .prof-supplier-bar-wrap {
      width: 100%;
      height: 6px;
      background: var(--bg-subtle);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }
    .prof-supplier-bar {
      height: 100%;
      background: var(--green);
      transition: width 0.2s ease;
    }
    .prof-supplier-bar.warn { background: var(--orange); }
    .prof-supplier-bar.alert { background: var(--red); }
    .prof-supplier-limit-line {
      font-size: var(--badge-font-size);
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Trend chart wrapper */
    .prof-chart-wrap { position: relative; height: 280px; padding: 12px; }
    .prof-chart-toggle-row { display: flex; gap: 8px; padding: 0 16px 12px; flex-wrap: wrap; }
    .prof-chart-toggle {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--btn-radius);
      padding: 4px 12px;
      font-size: var(--badge-font-size);
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--body-font);
    }
    .prof-chart-toggle.active { background: var(--stax-primary); color: var(--white); border-color: var(--stax-primary); }

    /* Status pill in tool / customer tables */
    .prof-status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--grey);
      margin-right: 6px;
      vertical-align: middle;
    }
    .prof-status-dot.green { background: var(--green); }
    .prof-status-dot.amber { background: var(--orange); }
    .prof-status-dot.red { background: var(--red); }

    /* Manual entry form for Predis / REimagine — moved out of removed
       API Cost Tracker tab. Same shape as the old admin-entry-form. */
    .prof-manual-form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 14px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
    }
    .prof-manual-form .form-input { width: auto; min-width: 140px; }
    .prof-manual-wrap .lookback-dropdown { min-width: 200px; }
  </style>
</head>
<body>
<script>
(function() {
  if (window.matchMedia('(display-mode: standalone)').matches && window.innerWidth < 768) {
    var s = document.createElement('style');
    s.textContent = 'body > *:not(#pwa-desktop-msg) { display: none !important; } body { margin: 0; background: var(--bg); }';
    document.head.appendChild(s);
    var d = document.createElement('div');
    d.id = 'pwa-desktop-msg';
    d.innerHTML = '<div class="pwa-guard-wrap">'
      + '<div class="pwa-guard-inner">'
      + '<img src="/StaxAI Cropped Transparent.png" alt="StaxAI" class="pwa-guard-logo">'
      + '<div class="pwa-guard-card">'
      + '<p class="pwa-guard-text">This page is designed for desktop. For the best experience please open StaxAI on your computer.</p>'
      + '<a href="/dashboard.html" class="pwa-guard-btn">Back to Dashboard</a>'
      + '</div></div></div>';
    document.body.appendChild(d);
  }
})();
</script>

  <!-- TOPBAR -->
  <nav class="topbar">
    <a href="/dashboard.html" class="topbar-logo">
      <img src="/StaxAI Cropped Transparent.png" alt="StaxAI">
    </a>
    <div class="topbar-nav">
      <a href="/dashboard.html">Dashboard</a>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-right">
      <div class="topbar-account-wrap">
        <button class="account-btn" id="account-btn"><span id="account-email-short">Account</span> &#9662;</button>
        <div class="account-dropdown" id="account-dropdown">
          <a href="/account" class="account-dropdown-item">Account Management</a>
          <button class="account-dropdown-item" id="sign-out-btn">Sign out</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- PAGE -->
  <div id="page-wrap" class="admin-container" style="display:none">

    <div class="page-header">
      <h1 class="page-title">Admin</h1>
      <p class="page-subtitle">Platform health, cost tracking, customer management.</p>
    </div>

    <!-- TAB NAV — API Cost Tracker removed; consolidated into Dashboard
         Overview's Profitability & Costs section per Profitability
         Dashboard Spec v1.0. -->
    <div class="tab-nav">
      <button class="ptab settings-active" data-tab="overview">Dashboard Overview</button>
      <button class="ptab" data-tab="customers">Customers</button>
      <button class="ptab" data-tab="revenue">Revenue</button>
      <button class="ptab" data-tab="usage">Tool Usage</button>
      <button class="ptab" data-tab="errors">Error Monitor</button>
      <button class="ptab" data-tab="infrastructure">Infrastructure</button>
    </div>

    <!-- SECTION CONTAINERS — populated by admin-logic.js in later build steps -->
    <div class="ptab-content active" id="tab-overview">
      <div class="admin-section" id="section-overview">
        <div class="admin-section-placeholder">Dashboard Overview — built in Step 2.</div>
      </div>
    </div>

    <div class="ptab-content" id="tab-customers">
      <div class="admin-section" id="section-customers">
        <div class="admin-section-placeholder">Customers — built in Step 4.</div>
      </div>
    </div>

    <div class="ptab-content" id="tab-revenue">
      <div class="admin-section" id="section-revenue">
        <div class="admin-section-placeholder">Revenue — built in Step 5.</div>
      </div>
    </div>

    <div class="ptab-content" id="tab-usage">
      <div class="admin-section" id="section-usage">
        <div class="admin-section-placeholder">Tool Usage — built in Step 6.</div>
      </div>
    </div>

    <div class="ptab-content" id="tab-errors">
      <div class="admin-section" id="section-errors">
        <div class="admin-section-placeholder">Error Monitor — built in Step 7.</div>
      </div>
    </div>

    <div class="ptab-content" id="tab-infrastructure">
      <div class="admin-section" id="section-infrastructure">
        <div class="admin-section-placeholder">Infrastructure — built in Step 8.</div>
      </div>
    </div>

  </div>

  <!-- Modal feedback container (used by shared-utils showModalError / showModalSuccess) -->
  <div class="save-msg" id="admin-msg">
    <div class="save-msg-card">
      <div class="save-msg-text"></div>
      <button type="button" class="save-msg-ok">OK</button>
    </div>
  </div>

  <!-- Customer detail modal — populated by admin-logic.js -->
  <div class="admin-modal-overlay" id="customer-detail-overlay">
    <div class="admin-modal-card">
      <div class="admin-modal-header">
        <div class="admin-modal-title" id="customer-detail-title">Customer detail</div>
        <button class="admin-modal-close" id="customer-detail-close" aria-label="Close">&times;</button>
      </div>
      <div class="admin-modal-body" id="customer-detail-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/supabase-client.js"></script>
  <script src="/auth.js"></script>
  <script src="/topbar.js"></script>
  <script src="/shared-utils.js"></script>
  <script src="/pwa.js"></script>
  <script src="/tools-data.js"></script>
  <script src="/admin-logic.js"></script>
  <script>
    (function() {
      var supabase = window.supabaseClient;
      if (!supabase) return;
      if (window.ADMIN_LOGIC && typeof window.ADMIN_LOGIC.init === 'function') {
        window.ADMIN_LOGIC.init(supabase);
      }
    })();
  </script>
</body>
</html>
