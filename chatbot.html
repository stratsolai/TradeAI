<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Website Chatbot - TradeAI Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1A5490; --blue-light: #2471a3; --orange: #E8500A; --orange-light: #ff6b2b;
      --bg: #0d1628; --bg2: #111d35; --bg3: #162240;
      --card: rgba(255,255,255,0.07); --card-border: rgba(255,255,255,0.12);
      --muted: rgba(255,255,255,0.65);
      --body-font: 'DM Sans', sans-serif; --heading-font: 'Barlow Condensed', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:var(--body-font); background:var(--bg); color:#fff; min-height:100vh; }

    .header {
      background:var(--bg2); border-bottom:1px solid var(--card-border);
      padding:0 40px; height:64px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
    }
    .logo { font-family:var(--heading-font); font-size:22px; font-weight:800; color:white; }
    .logo span { color:var(--orange); }
    .header-actions { display:flex; gap:10px; }
    .btn-back, .btn-settings {
      padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600;
      text-decoration:none; transition:all 0.2s; border:1px solid var(--card-border);
      font-family:var(--body-font); cursor:pointer;
    }
    .btn-back { background:var(--bg3); color:var(--muted); }
    .btn-back:hover { color:white; border-color:rgba(255,255,255,0.25); }
    .btn-settings { background:rgba(232,80,10,0.15); color:var(--orange); border-color:rgba(232,80,10,0.3); }
    .btn-settings:hover { background:rgba(232,80,10,0.25); }

    .container { max-width:900px; margin:0 auto; padding:40px 20px; }
    .page-title { font-family:var(--heading-font); font-size:38px; font-weight:800; margin-bottom:6px; letter-spacing:0.5px; }
    .page-subtitle { color:var(--muted); font-size:16px; margin-bottom:36px; }

    .card {
      background:var(--bg2); border:1px solid var(--card-border);
      border-radius:16px; padding:36px; margin-bottom:28px;
    }
    .section-title { font-family:var(--heading-font); font-size:22px; font-weight:700; margin-bottom:18px; letter-spacing:0.3px; }

    .info-box {
      background:rgba(26,84,144,0.12); border:1px solid rgba(26,84,144,0.3);
      border-left:3px solid var(--blue-light);
      padding:16px; margin-bottom:24px; border-radius:8px;
    }
    .info-box p { margin-bottom:6px; line-height:1.6; color:rgba(255,255,255,0.85); font-size:14px; }
    .info-box strong { color:white; }

    /* Chat widget */
    .chat-container {
      max-width:420px; margin:0 auto;
      border:1px solid var(--card-border); border-radius:16px; overflow:hidden;
      box-shadow:0 16px 48px rgba(0,0,0,0.4);
    }
    .chat-header {
      background:linear-gradient(135deg, var(--blue), var(--blue-light));
      color:white; padding:18px 20px; font-weight:700; font-size:16px;
      display:flex; align-items:center; gap:10px;
    }
    .chat-header::before {
      content:''; width:10px; height:10px; border-radius:50%;
      background:#6ee7b7; box-shadow:0 0 8px rgba(110,231,183,0.6);
    }
    .chat-messages {
      height:420px; overflow-y:auto; padding:20px;
      background:var(--bg3);
      scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.1) transparent;
    }
    .message { margin-bottom:16px; display:flex; flex-direction:column; }
    .message.user { align-items:flex-end; }
    .message.bot { align-items:flex-start; }
    .message-bubble {
      max-width:80%; padding:12px 16px; border-radius:12px; line-height:1.5; font-size:14px;
    }
    .message.user .message-bubble { background:var(--orange); color:white; border-radius:12px 12px 4px 12px; }
    .message.bot .message-bubble { background:var(--bg2); color:rgba(255,255,255,0.9); border:1px solid var(--card-border); border-radius:12px 12px 12px 4px; }

    .typing-indicator {
      display:none; padding:12px 16px;
      background:var(--bg2); border:1px solid var(--card-border);
      border-radius:12px 12px 12px 4px; max-width:70px; margin-bottom:16px;
    }
    .typing-indicator.active { display:block; }
    .typing-dot {
      display:inline-block; width:8px; height:8px; border-radius:50%;
      background:var(--muted); margin:0 2px;
      animation:typing 1.4s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay:0.2s; }
    .typing-dot:nth-child(3) { animation-delay:0.4s; }
    @keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

    .chat-input-container {
      display:flex; padding:14px 16px;
      background:var(--bg2); border-top:1px solid var(--card-border); gap:10px;
    }
    .chat-input {
      flex:1; padding:11px 14px;
      background:var(--bg3); border:1px solid var(--card-border);
      border-radius:8px; color:white; font-size:14px; font-family:var(--body-font);
      outline:none; transition:border-color 0.2s;
    }
    .chat-input:focus { border-color:var(--blue-light); }
    .chat-input::placeholder { color:rgba(255,255,255,0.3); }
    .chat-send {
      padding:11px 20px; background:var(--orange); color:white;
      border:none; border-radius:8px; cursor:pointer; font-weight:700;
      font-family:var(--body-font); font-size:14px; transition:all 0.2s;
    }
    .chat-send:hover { background:var(--orange-light); }
    .chat-send:disabled { background:rgba(255,255,255,0.1); color:var(--muted); cursor:not-allowed; }

    @media(max-width:768px) { .header{padding:0 20px;} .container{padding:24px 16px;} }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Trade<span>AI</span> Pro</div>
    <div class="header-actions">
      <a href="/chatbot-settings.html" class="btn-settings">⚙️ Settings</a>
      <a href="/dashboard.html" class="btn-back">← Dashboard</a>
    </div>
  </div>

  <div class="container">
    <h1 class="page-title">AI Website Chatbot 💬</h1>
    <p class="page-subtitle">Live demo of your AI-powered website chatbot</p>

    <div class="card">
      <h2 class="section-title">Try the Chatbot</h2>
      <div class="info-box">
        <p><strong>This is a working demo!</strong></p>
        <p>Type a message below and the AI will respond in real-time using your chatbot settings.</p>
      </div>
      <div class="chat-container">
        <div class="chat-header" id="chat-header-title">Chat with us</div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="typing-indicator" id="typing-indicator">
          <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
        </div>
        <div class="chat-input-container">
          <input type="text" class="chat-input" id="chat-input" placeholder="Type your message..."
            onkeypress="if(event.key==='Enter') sendMessage()">
          <button class="chat-send" id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-client.js"></script>
  <script src="./auth.js"></script>
  <script>
    requireAuth();
    let conversationHistory = [];

    async function loadGreeting() {
      try {
        const profile = await getUserProfile();
        if (!profile) return;
        const settings = profile.chatbot_settings || {};
        const greeting = settings.greeting_message || '👋 Hi! How can I help you today?';
        const businessName = settings.business_name || profile.business_name || 'us';
        document.getElementById('chat-header-title').textContent = `Chat with ${businessName}`;
        const messagesContainer = document.getElementById('chat-messages');
        if (messagesContainer.children.length === 0) addMessage(greeting, 'bot');
      } catch (error) { console.error('Error in loadGreeting:', error); }
    }

    window.addEventListener('DOMContentLoaded', () => { setTimeout(loadGreeting, 500); });

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const message = input.value.trim();
      if (!message) return;
      input.disabled = true;
      document.getElementById('send-btn').disabled = true;
      addMessage(message, 'user');
      input.value = '';
      document.getElementById('typing-indicator').classList.add('active');
      try {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const response = await fetch('/api/chatbot', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, conversationHistory, userId: user?.id })
        });
        const data = await response.json();
        document.getElementById('typing-indicator').classList.remove('active');
        if (data.success) { addMessage(data.message, 'bot'); conversationHistory = data.conversationHistory; }
        else addMessage('Sorry, I encountered an error. Please try again.', 'bot');
      } catch (error) {
        document.getElementById('typing-indicator').classList.remove('active');
        addMessage("Sorry, I couldn't connect to the server. Please try again.", 'bot');
      }
      input.disabled = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }

    function addMessage(text, sender) {
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;
      div.appendChild(bubble);
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
  </script>
</body>
</html>
