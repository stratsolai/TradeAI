<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<title>Content Library - StaxAI</title>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/staxai-auth.css">
<style>
    .stat-card[data-status] { cursor: pointer; }
    .stat-card[data-status="all"] { cursor: default; }

    /* ─── BUTTONS ─── */
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: var(--btn-radius);
      cursor: pointer;
      font-size: var(--status-font-size);
      font-weight: var(--font-weight-semibold);
      font-family: var(--body-font);
      transition: all var(--btn-transition);
      display: inline-flex;
      align-items: center;
      gap: var(--btn-gap);
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ─── FORMS ─── */
    label {
      display: block;
      margin-bottom: var(--label-margin-bottom);
      font-size: var(--label-font-size);
      font-weight: var(--font-weight-semibold);
      color: var(--text);
    }

    input[type="text"], input[type="url"], input[type="date"],
    textarea, select {
      width: 100%;
      padding: var(--input-padding);
      border: var(--input-border-width) solid var(--border);
      border-radius: var(--input-radius);
      font-size: var(--input-font-size);
      font-family: var(--body-font);
      color: var(--text);
      transition: border-color var(--btn-transition);
      background: var(--white);
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--blue);
    }

    textarea { resize: vertical; min-height: var(--textarea-min-height); }

    /* ─── UPLOAD TAB ─── */
    .upload-section { margin-bottom: 28px; }
    .upload-section-title { font-size: var(--section-title-font-size); font-weight: var(--section-title-font-weight); color: var(--text); margin-bottom: 4px; text-transform: uppercase; letter-spacing: var(--letter-spacing-label); }
    .upload-section-note { font-size: var(--note-font-size); color: var(--text-muted); margin-bottom: 12px; }
    /* ── Upload & Import tab ──────────────────────────────────────────── */
    .upload-tab-inner { padding: 24px 0; }
    .upload-primary-actions { display: flex; gap: 16px; margin-bottom: 24px; }
    .upload-primary-actions .upload-zone { flex: 1; }
    .btn-browse { margin-top: 8px; padding: 8px 20px; background: var(--blue); color: var(--white); border: none; border-radius: 6px; font-size: var(--status-font-size); font-weight: var(--font-weight-semibold); cursor: pointer; }
    .btn-browse:hover { background: var(--blue-dark); }
    .offline-banner { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 16px; background: var(--orange-light); border: 1px solid var(--orange); border-radius: var(--btn-radius); margin-bottom: 16px; font-size: var(--btn-font-size); color: var(--orange); }
    .upload-confirm { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; font-size: var(--btn-font-size); }
    .upload-confirm-pill { padding: 10px 16px; background: var(--blue-light); border: 1px solid var(--blue); border-radius: var(--btn-radius); color: var(--text); flex: 1; }
    .btn-link { color: var(--blue); font-weight: var(--font-weight-semibold); text-decoration: underline; cursor: pointer; }



    /* ── Sources grid ─────────────────────────────────────────────────────────── */
    .sources-tiles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .source-tile { display: flex; flex-direction: column; gap: 16px; background: var(--white); border-radius: var(--card-radius); border-left: 4px solid var(--blue); box-shadow: 0 2px 8px var(--shadow-card); padding: 24px 28px; align-items: center; min-height: 280px; }
    .source-tile-top { display: grid; grid-template-columns: 32px 1fr; align-items: flex-start; justify-items: start; gap: 14px; align-self: stretch; padding-left: 28px; }
    .source-tile-icon { font-size: 26px; flex-shrink: 0; margin-top: 2px; }
    .source-tile-body { flex: 1; min-width: 0; }
    .source-tile-name { font-size: var(--btn-font-size); font-weight: var(--heading-lg-weight); color: var(--text); margin-bottom: 4px; word-break: break-all; }
    .source-tile-desc { font-size: var(--note-font-size); color: var(--text-muted); line-height: var(--note-line-height); }
    .source-tile-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: auto; }
    .source-action-btn { display:flex; align-items:center; justify-content:center; min-width:100px; border:2px solid var(--blue); border-radius:var(--btn-radius); padding:10px 16px; font-size:var(--status-font-size); font-weight:var(--font-weight-semibold); color:var(--blue); background:var(--white); cursor:pointer; font-family:var(--body-font); transition:opacity var(--btn-transition); text-decoration:none; }
    .source-scan-btn { border-color:var(--blue); color:var(--blue); }
    .source-scan-btn:hover:not(.source-btn-disabled) { background:var(--blue-light); }
    .source-connect-btn { border-color:var(--orange); color:var(--orange); }
    .source-connect-btn:hover:not(.source-btn-disabled) { background:var(--orange-light); }
    .source-stop-btn { border-color:var(--red-dark); color:var(--red-dark); }
    .source-stop-btn:hover { background:var(--red-hover-bg); }
    .source-tile-urls { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .source-url-item { display: flex; align-items: center; gap: 8px; font-size: var(--note-font-size); color: var(--text-muted); }
    .source-url-item input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--blue); cursor: pointer; flex-shrink: 0; }
    .source-url-label { word-break: break-all; }
    .source-select-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .source-select-pill { padding: 4px 12px; border-radius: var(--btn-radius); border: 1px solid var(--blue); background: transparent; color: var(--text); font-size: var(--status-font-size); font-family: var(--body-font); cursor: pointer; transition: background var(--btn-transition); }
    .source-select-pill.selected { background: var(--blue-light); }
    .source-pill-instruction { font-size: var(--badge-font-size); color: var(--text-muted); margin-bottom: var(--label-margin-bottom); text-align: center; }
    .source-tile-note { font-size: var(--badge-font-size); color: var(--text-muted); font-style: italic; margin-top: auto; }
    .source-tile-centred { grid-column: 1 / -1; justify-self: center; width: calc((100% - 16px) / 2); }
    .source-tile-actions-flush { margin-top: 0; }
    .source-select-pills-centred { justify-content: center; }
    .source-btn-disabled { border-color: var(--border); color: var(--text-disabled); background: var(--white); cursor: not-allowed; pointer-events: none; }
    .source-tile-loading { grid-column: 1 / -1; padding: 24px; color: var(--text-muted); font-size: var(--btn-font-size); }
    .source-tile-error { grid-column: 1 / -1; padding: 16px; color: var(--red); font-size: var(--btn-font-size); background: var(--red-light); border-radius: var(--btn-radius); }
    @media (max-width: 640px) { .sources-tiles { grid-template-columns: 1fr; } }

    /* ── Manual Add flow ─────────────────────────────────────────── */
    .manual-add-flow { background: var(--white); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 24px; margin-bottom: 24px; }
    .manual-add-input { width: 100%; padding: var(--input-padding); border: var(--input-border-width) solid var(--border); border-radius: var(--input-radius); font-size: var(--input-font-size); font-family: var(--body-font); color: var(--text); background: var(--white); }
    .manual-add-input:focus { outline: none; border-color: var(--blue); }
    .manual-add-textarea { width: 100%; padding: var(--input-padding); border: var(--input-border-width) solid var(--border); border-radius: var(--input-radius); font-size: var(--input-font-size); font-family: var(--body-font); color: var(--text); background: var(--white); resize: vertical; }
    .manual-add-textarea:focus { outline: none; border-color: var(--blue); }
    .manual-add-label-top { margin-top: 12px; }
    .manual-add-required { color: var(--red-dark); }
    .manual-add-submit { border-color: var(--blue); color: var(--blue); min-width: 100px; justify-content: center; }
    .manual-add-cancel { min-width: 100px; justify-content: center; }
    .upload-confirm-stack { flex-direction: column; gap: 8px; align-items: stretch; }
    .upload-section-sources { margin-top: 16px; }

    /* ── Upload message variants ─────────────────────────────────── */
    .upload-message-success .upload-confirm-pill { border-color: var(--green-dark); }
    .upload-message-error .upload-confirm-pill { border-color: var(--red-dark); }
    .upload-message-processing .upload-confirm-pill { border-color: var(--blue); }

/* ── Review Tab ─────────────────────────────────────────── */
.review-wrap { padding-bottom: 40px; }

/* Status pill row */
.review-status-row { display:flex; gap:8px; padding:16px 0; align-items:center; }
/* CL status button variants — border colours per status */
.status-btn[data-status="pending"] { border-left-color:var(--blue); }
.status-btn[data-status="approved"] { border-left-color:var(--green-dark); }
.status-btn[data-status="rejected"] { border-left-color:var(--red); }
.status-btn[data-status="archived"] { border-left-color:var(--grey-accent); }

/* Filter pills — category and tool */
.review-filter-row { margin-bottom:12px; }

/* Search */
.review-search-input {
  width:240px; max-width:240px; margin-left:auto; padding:10px 14px; border:var(--input-border-width) solid var(--border);
  border-radius:var(--btn-radius); font-size:var(--input-font-size); font-family:var(--body-font);
  box-sizing:border-box; background:var(--white); color:var(--text);
}
.review-search-input:focus { outline:none; border-color:var(--blue); }

/* Bulk bar */
.review-bulk-bar {
  display:flex; align-items:center; gap:var(--actions-gap); flex-wrap:wrap;
  background:var(--bg); border:1px solid var(--border); border-radius:var(--btn-radius);
  padding:10px 16px; margin-bottom:16px;
}
.review-bulk-label { font-size:var(--note-font-size); color:var(--text-secondary); }
.review-bulk-approve-btn { border-color:var(--green-dark); color:var(--green-dark); }
.review-bulk-approve-btn:hover { background:var(--green-dark); color:var(--white); }
.review-bulk-reject-btn { border-color:var(--red-dark); color:var(--red-dark); }
.review-bulk-reject-btn:hover { background:var(--red-dark); color:var(--white); }

/* Item list */
.review-list { display:flex; flex-direction:column; gap:12px; }

.item-card-title {
  flex:1; min-width:140px; font-size:var(--section-title-font-size); font-weight:var(--font-weight-semibold);
  color:var(--text); outline:none; cursor:text;
  border-bottom:1px solid transparent;
}
.item-card-title:focus { border-bottom-color:var(--blue); }
.review-type-badge {
  padding:3px 10px; border-radius:var(--badge-radius); font-size:var(--badge-font-size);
  background:var(--blue-tint); color:var(--blue); white-space:nowrap; font-weight:500;
}
.review-source-badge {
  padding:3px 10px; border-radius:var(--badge-radius); font-size:var(--badge-font-size);
  background:var(--bg); color:var(--text-muted); white-space:nowrap;
}
.review-filter-btns-row { display:flex; align-items:center; gap:8px; padding:0 0 12px 0; }
/* .review-tools-btn, .review-cats-btn, .review-approve-btn, .review-reject-btn — base + hover consolidated in staxai-auth.css section 17 */


.review-filter-spacer { flex:1; }
.review-title-wrap { flex:1; min-width:140px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.review-title-wrap .item-card-title { flex:0 1 auto; min-width:0; }
.review-thumb { width:48px; height:48px; object-fit:cover; border-radius:var(--radius-thumbnail); flex-shrink:0; }
.review-scroll-highlight { outline:2px solid var(--blue); }


/* Tool tag pills */
.review-tool-pills { display:flex; flex-wrap:wrap; gap:8px; }
.tool-pill {
  padding:5px 14px; border-radius:var(--btn-radius);
  border:1px solid var(--blue); background:var(--white); color:var(--blue);
  font-size:var(--status-font-size); font-family:var(--body-font); cursor:pointer; transition:background var(--btn-transition),color var(--btn-transition);
}
.tool-pill-inactive {
  padding:5px 14px; border-radius:var(--btn-radius);
  border:1px solid var(--border); background:var(--bg); color:var(--text-disabled);
  font-size:var(--status-font-size); display:inline-flex; align-items:center; gap:6px;
  text-decoration:none; cursor:pointer; transition:background var(--btn-transition), border-color var(--btn-transition);
}
.tool-pill-inactive:hover { background:var(--blue-tint); border-color:var(--blue); color:var(--blue); }
.tool-pill-add-stax { font-size:11px; font-weight:var(--font-weight-semibold); color:var(--blue); white-space:nowrap; }
.tool-pill-inactive:hover .tool-pill-add-stax { color:var(--blue-accent-hover); }

/* Source detail — uses shared .source-detail and .source-detail-label from stylesheet */
.review-empty-detail { color:var(--text-disabled); font-style:italic; }
.list-empty-detail { color:var(--text-disabled); font-style:italic; }

/* States — uses shared .list-loading and .list-empty from stylesheet */

/* ---- Business Profile tab ---- */
/* .profile-nav-chip, .profile-section-card and variants moved to staxai-auth.css section 9b */
.profile-wrap { padding: 0; }
.profile-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.profile-field { display: flex; flex-direction: column; gap: 6px; }
.profile-field-full { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 6px; }
.profile-label { font-size: var(--label-font-size); font-weight: var(--font-weight-semibold); color: var(--text); font-family: var(--body-font); }
.profile-optional { font-weight: 400; color: var(--text-muted); }
.profile-input { width: 100%; padding: var(--input-padding); border: var(--input-border-width) solid var(--border); border-radius: var(--input-radius); font-size: var(--btn-font-size); color: var(--text); background: var(--white); font-family: var(--body-font); box-sizing: border-box; transition: border-color var(--btn-transition); }
.profile-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--focus-ring); }
.profile-textarea { width: 100%; padding: var(--input-padding); border: var(--input-border-width) solid var(--border); border-radius: var(--input-radius); font-size: var(--btn-font-size); color: var(--text); background: var(--white); font-family: var(--body-font); box-sizing: border-box; resize: vertical; }
.profile-textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--focus-ring); }
.profile-address-row { display: grid; grid-template-columns: 1fr 80px 100px; gap: 12px; }
.profile-save-row { display: flex; align-items: center; gap: 16px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-light); }
.profile-repeating-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.profile-repeating-row .profile-input { flex: 1; }
.profile-add-btn { margin-top: 4px; }
.profile-logo-wrap { display: flex; align-items: center; gap: 16px; margin-top: 4px; }
.profile-logo-preview { height: 60px; border-radius: 6px; border: 1px solid var(--border); }
.profile-logo-placeholder { width: 80px; height: 60px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--text-hint); font-size: var(--badge-font-size); }
.profile-file-input { display: none; }
.profile-toggle-row { display: flex; gap: 8px; margin-top: 8px; }
.profile-location-block { background: var(--bg-subtle); border-radius: var(--btn-radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; }
.profile-panel { display: none; }
.profile-panel.active { display: block; }
.profile-location-row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.profile-location-title { color: var(--blue); font-weight: var(--heading-lg-weight); }
.profile-fields-compact { margin-bottom: 12px; }
.profile-label-heading { margin-bottom: 8px; }
.profile-input-narrow { max-width: 120px; }
.profile-input-mb { margin-bottom: 8px; }
.profile-btn-add-location { margin-top: 12px; margin-bottom: 24px; }
.profile-btn-add-website { margin-top: 8px; }
.profile-btn-add-statement { border-left-color: var(--purple); margin-top: 8px; }
.profile-location-block-websites { margin-top: 0; }
.loc-phone-type { min-width: 90px; }
.profile-field .lookback-dropdown-wrap { width: 100%; }
.profile-field .lookback-dropdown { width: 100%; text-align: left; box-sizing: border-box; }

.prof-custom-pill { position: relative; }
.prof-pill-remove { margin-left: 4px; font-weight: 700; cursor: pointer; }

.profile-svc-row { display: grid; grid-template-columns: 1fr 160px auto; gap: 8px; align-items: start; margin-bottom: 8px; }
.profile-svc-row-range { grid-template-columns: 1fr 160px 100px 100px; }
.profile-svc-amount { display: flex; gap: 6px; align-items: center; }
.profile-svc-amount .profile-input { max-width: 120px; }
.profile-svc-remove { background: none; border: none; cursor: pointer; color: var(--red); font-size: 18px; line-height: 1; padding: 4px; margin-top: 6px; }

.profile-hours-grid { margin-top: 4px; }
.profile-hours-row { display: grid; grid-template-columns: 90px 1fr 1fr; gap: 8px; align-items: center; margin-bottom: 6px; }
.profile-hours-day { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--text); }
.profile-hours-day input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--blue); cursor: pointer; }
.profile-hours-preset { display: flex; gap: 8px; margin-bottom: 12px; }

.profile-field-full .lookback-dropdown-wrap { width: 100%; }
.profile-field-full .lookback-dropdown { width: 100%; text-align: left; box-sizing: border-box; }

    @media (max-width: 768px) {
      .profile-fields { grid-template-columns: 1fr; }
      .profile-address-row { grid-template-columns: 1fr; }
      input[type="text"], input[type="url"], input[type="date"],
      textarea, select { font-size: 16px; }
    }
</style>
</head>

<script src="/cl-logic.js"></script>
<script>
  (function() {
    var supabase = window.supabaseClient;
    if (!supabase) return;
    supabase.auth.getSession().then(function(result) {
      var session = result.data && result.data.session;
      if (!session) { window.location.href = '/login'; return; }
      document.getElementById('page-wrap').style.display = 'block';
    });
  })();
</script>
</body>
</html>
