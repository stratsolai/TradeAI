<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - TradeAI Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1A5490;
      --blue-light: #2471a3;
      --orange: #E8500A;
      --orange-light: #ff6b2b;
      --bg: #0d1628;
      --bg2: #111d35;
      --bg3: #162240;
      --card: rgba(255,255,255,0.07);
      --card-border: rgba(255,255,255,0.12);
      --muted: rgba(255,255,255,0.65);
      --body-font: 'DM Sans', sans-serif;
      --heading-font: 'Barlow Condensed', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:var(--body-font); background:var(--bg); color:#fff; min-height:100vh; }

    /* ── HEADER ── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--card-border);
      padding: 0 40px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top:0; z-index:100;
      backdrop-filter: blur(12px);
    }
    .logo {
      font-family: var(--heading-font);
      font-size: 22px; font-weight: 800; letter-spacing: 0.5px;
      color: white;
    }
    .logo span { color: var(--orange); }
    .header-right { display:flex; align-items:center; gap:16px; }
    .content-lib-btn {
      padding: 8px 16px;
      background: rgba(232,80,10,0.15);
      border: 1px solid rgba(232,80,10,0.35);
      color: var(--orange);
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px; font-weight: 600;
      transition: all 0.2s;
    }
    .content-lib-btn:hover { background: rgba(232,80,10,0.25); }
    .user-name { font-size: 14px; color: var(--muted); }
    .btn-logout {
      padding: 8px 16px; background: transparent;
      border: 1px solid var(--card-border);
      color: var(--muted); border-radius: 8px;
      cursor: pointer; font-size: 13px; font-family: var(--body-font);
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: rgba(255,255,255,0.3); color: white; }

    /* ── CONTAINER ── */
    .container { max-width:1200px; margin:0 auto; padding:40px 20px; }

    .welcome { margin-bottom:36px; }
    .welcome h1 {
      font-family: var(--heading-font);
      font-size: 36px; font-weight: 800; letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .welcome h1 span { color: var(--orange); }
    .welcome p { color: var(--muted); font-size: 16px; }

    /* ── TABS ── */
    .tabs-container {
      background: var(--bg2);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--card-border);
      background: rgba(255,255,255,0.03);
    }
    .tab {
      flex: 1; padding: 18px 24px;
      background: none; border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer; font-size: 15px; font-weight: 600;
      color: var(--muted); transition: all 0.2s;
      font-family: var(--body-font);
    }
    .tab:hover { color: white; background: rgba(255,255,255,0.04); }
    .tab.active { color: white; border-bottom-color: var(--orange); }
    .tab-badge {
      display: inline-block; margin-left: 8px;
      padding: 2px 8px; background: var(--orange);
      color: white; border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }
    .tab.active .tab-badge { background: var(--blue); }

    .tab-content { display:none; padding:32px; min-height:400px; }
    .tab-content.active { display:block; }

    /* ── TOOLS GRID ── */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .tool-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      padding: 24px; border-radius: 14px;
      cursor: pointer; transition: all 0.25s;
      position: relative;
    }
    .tool-card:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.1);
      border-color: rgba(26,84,144,0.5);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .tool-card.available { cursor: default; }
    .tool-card.available:hover { transform: none; box-shadow: none; }

    .tool-status {
      display: inline-block; padding: 4px 12px;
      background: rgba(16,185,129,0.15); color: #6ee7b7;
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 20px; font-size: 12px; font-weight: 600;
      margin-bottom: 14px;
    }
    .tool-status.inactive {
      background: rgba(245,158,11,0.12); color: #fcd34d;
      border-color: rgba(245,158,11,0.2);
    }
    .tool-icon { font-size: 44px; margin-bottom: 14px; display: block; }
    .tool-name {
      font-family: var(--heading-font);
      font-size: 20px; font-weight: 700; letter-spacing: 0.3px;
      color: white; margin-bottom: 8px;
    }
    .tool-desc { color: var(--muted); font-size: 14px; line-height: 1.55; margin-bottom: 16px; min-height: 60px; }
    .tool-price { font-size: 17px; font-weight: 700; color: var(--orange); margin-bottom: 14px; }

    .btn-activate {
      width: 100%; padding: 12px; background: var(--orange);
      color: white; border: none; border-radius: 8px;
      cursor: pointer; font-weight: 700; font-size: 14px;
      font-family: var(--body-font); transition: all 0.2s;
    }
    .btn-activate:hover { background: var(--orange-light); transform: translateY(-1px); }

    .btn-configure {
      width: 100%; padding: 12px; background: var(--blue);
      color: white; border: none; border-radius: 8px;
      cursor: pointer; font-weight: 700; font-size: 14px;
      font-family: var(--body-font); text-decoration: none;
      display: block; text-align: center; transition: all 0.2s;
    }
    .btn-configure:hover { background: var(--blue-light); transform: translateY(-1px); }

    /* ── EMPTY STATES ── */
    .empty-state { text-align:center; padding:80px 20px; }
    .empty-state-icon { font-size:64px; margin-bottom:16px; opacity:0.4; display:block; }
    .empty-state h3 { font-family:var(--heading-font); font-size:26px; font-weight:700; color:white; margin-bottom:10px; }
    .empty-state p { color:var(--muted); font-size:16px; line-height:1.6; margin-bottom:24px; }
    .btn-browse {
      display: inline-block; padding: 12px 28px;
      background: var(--orange); color: white;
      border-radius: 8px; text-decoration: none;
      font-weight: 700; font-size: 14px; transition: all 0.2s;
    }
    .btn-browse:hover { background: var(--orange-light); transform: translateY(-1px); }

    @media(max-width:768px) {
      .header { padding: 0 20px; }
      .container { padding: 24px 16px; }
      .tab-content { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">Trade<span>AI</span> Pro</div>
    <div class="header-right">
      <a href="/content-library.html" class="content-lib-btn">📚 Content Library</a>
      <span class="user-name" id="user-name">Loading...</span>
      <button class="btn-logout" onclick="handleLogout()">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="welcome">
      <h1>Welcome back, <span id="business-name">there</span> 👋</h1>
      <p>Manage your AI tools and discover new ways to automate your business.</p>
    </div>

    <div class="tabs-container">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('active')">
          My Active Tools
          <span class="tab-badge" id="active-count">0</span>
        </button>
        <button class="tab" onclick="switchTab('available')">
          Available Tools
          <span class="tab-badge" id="available-count">0</span>
        </button>
      </div>

      <div class="tab-content active" id="active-tab">
        <div id="active-tools-container"></div>
      </div>

      <div class="tab-content" id="available-tab">
        <div id="available-tools-container"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-client.js"></script>
  <script src="./auth.js"></script>

  <script>
    const allTools = [
      { id:'chatbot', icon:'💬', name:'AI Website Chatbot', desc:'Live chat on your website that responds instantly 24/7. AI qualifies leads, answers questions, books consultations.', price:79, priceId:'price_1T4dAyHnoVvjo5gxMgLczawf', link:'/chatbot.html' },
      { id:'email', icon:'📧', name:'Smart Email Assistant', desc:'AI reads your emails, prioritises urgent ones, and drafts replies. Never miss an important customer inquiry.', price:69, priceId:'price_1T4dBcHnoVvjo5gx8EuxX5hL', link:'/email.html' },
      { id:'social', icon:'📱', name:'Social Media Manager', desc:'AI creates posts for Facebook, Instagram, LinkedIn. Upload project photos, AI writes engaging captions.', price:59, priceId:'price_1T4dCEHnoVvjo5gxQysf0vQI', link:'/social.html' },
      { id:'bi', icon:'📊', name:'Business Intelligence Dashboard', desc:'Real-time metrics: leads, revenue, conversion rates. AI identifies trends and suggests improvements.', price:89, priceId:'price_1T4dClHnoVvjo5gxjSvoi4ky', link:'/bi.html' },
      { id:'tender', icon:'📑', name:'Tender Response Generator', desc:'Upload RFT/RFQ documents. AI extracts requirements, generates comprehensive responses, identifies gaps.', price:99, priceId:'price_1T4dDMHnoVvjo5gxWhPHyqQc', link:'/tender.html' }
    ];

    let userProfile = null;
    let activeToolIds = [];

    window.switchTab = function(tabName) {
      document.querySelectorAll('.tab').forEach((t,i) => {
        t.classList.toggle('active', (tabName==='active' && i===0) || (tabName==='available' && i===1));
      });
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(`${tabName}-tab`).classList.add('active');
    };

    async function init() {
      const isAuthenticated = await requireAuth();
      if (!isAuthenticated) return;

      userProfile = await getUserProfile();
      if (userProfile) {
        document.getElementById('user-name').textContent = userProfile.email;
        document.getElementById('business-name').textContent = userProfile.business_name || 'there';
        activeToolIds = userProfile.activated_tools || [];
        if (activeToolIds.length === 0) {
          activeToolIds = ['chatbot'];
          await updateActivatedTools();
        }
        renderTools();

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('success')) {
          setTimeout(() => {
            alert('🎉 Payment successful!\n\nYour tool is being activated. You should receive a confirmation email from Stripe shortly.');
            window.history.replaceState({}, document.title, '/dashboard.html');
          }, 500);
        } else if (urlParams.get('canceled')) {
          setTimeout(() => {
            alert('Payment canceled. You can activate tools anytime from the Available Tools tab.');
            window.history.replaceState({}, document.title, '/dashboard.html');
          }, 500);
        }
      }
    }

    function renderTools() {
      const activeTools = allTools.filter(t => activeToolIds.includes(t.id));
      const availableTools = allTools.filter(t => !activeToolIds.includes(t.id));

      document.getElementById('active-count').textContent = activeTools.length;
      document.getElementById('available-count').textContent = availableTools.length;

      const activeContainer = document.getElementById('active-tools-container');
      if (activeTools.length === 0) {
        activeContainer.innerHTML = `<div class="empty-state"><span class="empty-state-icon">📦</span><h3>No Active Tools Yet</h3><p>You haven't activated any tools yet.<br>Browse available tools to get started!</p><a href="#" class="btn-browse" onclick="switchTab('available');return false;">Browse Tools</a></div>`;
      } else {
        activeContainer.innerHTML = `<div class="tools-grid">${activeTools.map(tool => `
          <div class="tool-card" onclick="window.location.href='${tool.link}'">
            <div class="tool-status">✓ Active</div>
            <div class="tool-icon">${tool.icon}</div>
            <div class="tool-name">${tool.name}</div>
            <div class="tool-desc">${tool.desc}</div>
            <div class="tool-price">$${tool.price}/month</div>
            <a href="${tool.link}" class="btn-configure" onclick="event.stopPropagation();">Open Tool →</a>
          </div>`).join('')}</div>`;
      }

      const availableContainer = document.getElementById('available-tools-container');
      if (availableTools.length === 0) {
        availableContainer.innerHTML = `<div class="empty-state"><span class="empty-state-icon">🎉</span><h3>All Tools Activated!</h3><p>You've activated all available tools.<br>More tools coming soon!</p></div>`;
      } else {
        availableContainer.innerHTML = `<div class="tools-grid">${availableTools.map(tool => `
          <div class="tool-card available">
            <div class="tool-status inactive">Not Active</div>
            <div class="tool-icon">${tool.icon}</div>
            <div class="tool-name">${tool.name}</div>
            <div class="tool-desc">${tool.desc}</div>
            <div class="tool-price">$${tool.price}/month</div>
            <button class="btn-activate" onclick="activateTool('${tool.id}','${tool.name}',${tool.price},event)">Activate Tool</button>
          </div>`).join('')}</div>`;
      }
    }

    window.activateTool = async function(toolId, toolName, price, event) {
      const tool = allTools.find(t => t.id === toolId);
      if (!tool) return;
      const confirmed = confirm(`Activate ${toolName} for $${price}/month?\n\nYou'll be redirected to Stripe to complete payment.`);
      if (!confirmed) return;
      try {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { alert('Please log in first'); return; }
        let btn = event?.target;
        if (btn) { btn.disabled = true; btn.textContent = 'Loading...'; }
        const response = await fetch('/api/create-checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ priceId: tool.priceId, userId: user.id, toolId: tool.id, toolName: tool.name })
        });
        const data = await response.json();
        if (data.success && data.url) {
          window.location.href = data.url;
        } else {
          alert('Error creating checkout session. Please try again.');
          if (btn) { btn.disabled = false; btn.textContent = 'Activate Tool'; }
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error: ' + error.message);
      }
    };

    async function updateActivatedTools() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) return;
      await supabaseClient.from('profiles').update({ activated_tools: activeToolIds }).eq('id', user.id);
    }

    async function handleLogout() {
      const result = await signOut();
      if (result.success) window.location.href = '/';
    }

    init();
  </script>
</body>
</html>
