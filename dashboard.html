<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <title>Dashboard — StaxAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/staxai-auth.css">
  <style>
    /* ── Dashboard container ── */
    .dash-container { max-width: var(--page-max-width); margin: 0 auto; padding: var(--page-padding); }

    /* ── Page heading ── */
    .dash-page-heading { margin-bottom: var(--page-header-margin); }

    /* ── Zone headings ── */
    .dash-heading {
      font-family: var(--heading-font);
      font-size: var(--page-title-font-size);
      font-weight: var(--heading-lg-weight);
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin: 0 0 16px;
    }
    .dash-heading .accent { color: var(--orange); }
    .dash-zone { margin-bottom: 40px; }

    /* ── Notification bar (BP completion) ── */
    #notification-bar { font-size: var(--note-font-size); font-weight: 500; }
    #notification-bar:empty { display: none; }
    .notif-item {
      display: flex;
      align-items: center;
      padding: 10px 32px;
      gap: 10px;
      background: var(--badge-orange-bg);
      color: var(--badge-orange-text);
      border-bottom: 1px solid var(--border);
    }
    .notif-item:last-child { border-bottom: none; }
    .notif-item a { color: var(--badge-orange-text); font-weight: var(--font-weight-semibold); margin-left: auto; text-decoration: underline; white-space: nowrap; }
    .notif-item a:hover { opacity: 1; }
    .notif-dismiss { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--badge-orange-text); padding: 0 4px; line-height: 1; }

    /* ── Trial modal actions ── */
    .trial-modal-actions { display: flex; gap: var(--actions-gap); justify-content: center; margin-top: 20px; }

    /* ── Zone 1: Action Tiles ── */
    .dash-action-tile {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: box-shadow var(--btn-transition);
    }
    .dash-action-tile:hover { box-shadow: 0 4px 16px var(--shadow-hover); opacity: 1; }
    .dash-action-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .dash-action-icon { font-size: 18px; line-height: 1; }
    .dash-action-name { font-size: var(--note-font-size); font-weight: var(--font-weight-semibold); color: var(--text-secondary); }

    /* ── Zone 2: Tool Overview Tiles ── */
    .dash-overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .dash-overview-tile {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 4px solid var(--blue);
      border-radius: var(--card-radius);
      overflow: hidden;
    }
    .dash-overview-tile-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .dash-overview-tile-icon { font-size: 18px; line-height: 1; }
    .dash-overview-tile-name {
      font-size: var(--section-title-font-size);
      font-weight: var(--font-weight-semibold);
      color: var(--text);
      flex: 1;
    }
    .dash-overview-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      text-decoration: none;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: background var(--btn-transition);
    }
    .dash-overview-link:last-child { border-bottom: none; }
    .dash-overview-link:hover { background: var(--blue-hover-bg); opacity: 1; }
    .dash-overview-link-value {
      font-family: var(--heading-font);
      font-size: var(--stat-value-font-size);
      font-weight: var(--heading-lg-weight);
      color: var(--orange);
      min-width: 40px;
      text-align: center;
    }
    .dash-overview-link-label { font-size: var(--body-font-size); color: var(--text); flex: 1; }
    .dash-overview-empty {
      padding: 12px 16px;
      font-size: var(--note-font-size);
      color: var(--text-muted);
    }

    /* ── Zone 3: Your Stax ── */
    .dash-stax-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .dash-stax-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow var(--btn-transition);
    }
    .dash-stax-card:hover { box-shadow: 0 4px 16px var(--shadow-hover); }
    .dash-stax-card.dash-stax-live { border-left: 4px solid var(--orange); }
    .dash-stax-card.dash-stax-coming { opacity: 0.45; }
    .dash-stax-card-top { display: flex; align-items: flex-start; gap: 10px; }
    .dash-stax-icon { font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px; }
    .dash-stax-card-info { flex: 1; min-width: 0; }
    .dash-stax-name { display: block; font-size: var(--note-font-size); font-weight: var(--font-weight-semibold); color: var(--text); line-height: 1.3; }
    .dash-stax-tagline { display: block; font-size: var(--badge-font-size); color: var(--text-muted); line-height: 1.4; margin-top: 2px; }
    .dash-stax-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .dash-stax-price { font-size: var(--badge-font-size); font-weight: var(--font-weight-semibold); color: var(--text); }
    .dash-stax-benefit { font-size: var(--badge-font-size); color: var(--text-muted); font-style: italic; }
    .dash-stax-card-actions { display: flex; align-items: center; gap: 10px; margin-top: auto; }
    .dash-stax-settings-link { font-size: var(--badge-font-size); color: var(--blue); text-decoration: none; font-weight: var(--font-weight-semibold); }
    .dash-stax-settings-link:hover { opacity: 0.85; }

    /* ── Responsive ── */
    @media (max-width: 1100px) { .dash-stax-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) {
      .dash-container { padding: var(--page-padding-mobile); }
      .dash-stax-grid { grid-template-columns: 1fr; }
      .dash-overview-grid { grid-template-columns: 1fr; }
      .notif-item { padding: 10px 16px; }
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <a href="/dashboard.html" class="topbar-logo">
      <img src="/StaxAI Cropped Transparent.png" alt="StaxAI">
    </a>
    <div class="topbar-spacer"></div>
    <div class="topbar-right">
      <div class="topbar-account-wrap">
        <button class="account-btn" id="account-btn"><span id="account-email-short">Account</span> &#9662;</button>
        <div class="account-dropdown" id="account-dropdown">
          <a href="/account" class="account-dropdown-item">Account Management</a>
          <button class="account-dropdown-item" id="sign-out-btn">Sign out</button>
        </div>
      </div>
    </div>
  </nav>

  <div id="notification-bar"></div>

  <div id="page-wrap" style="display:none">
    <div class="dash-container">

      <div class="save-msg" id="trial-modal">
        <div class="save-msg-card">
          <div class="save-msg-text" id="trial-modal-msg"></div>
          <div class="trial-modal-actions">
            <button type="button" class="btn-primary" id="trial-modal-cta">Subscribe Now</button>
            <button type="button" class="save-msg-ok" id="trial-modal-dismiss">Dismiss</button>
          </div>
        </div>
      </div>

      <div class="dash-page-heading">
        <h1 class="page-title" id="dash-heading">Dashboard</h1>
      </div>

      <!-- Zone 1: Action Tiles -->
      <section class="dash-zone" id="zone-1-wrap">
        <div class="stats-bar" id="zone-1"></div>
      </section>

      <!-- Zone 2: Tool Overview Tiles -->
      <section class="dash-zone" id="zone-2-wrap">
        <h2 class="dash-heading">YOUR <span class="accent">TOOLS</span></h2>
        <div class="dash-overview-grid" id="zone-2"></div>
      </section>

      <!-- Zone 3: Your Stax -->
      <section class="dash-zone" id="zone-3-wrap">
        <h2 class="dash-heading">YOUR <span class="accent">STAX</span></h2>
        <div class="tab-nav">
          <button class="ptab active" data-tab="active">Active Tools</button>
          <button class="ptab" data-tab="available">Available Tools</button>
        </div>
        <div class="ptab-content active" id="dash-tab-active"></div>
        <div class="ptab-content" id="dash-tab-available"></div>
      </section>

    </div>
  </div>

  <div class="save-msg" id="dash-error-msg">
    <div class="save-msg-card">
      <div class="save-msg-text"></div>
      <button type="button" class="save-msg-ok">OK</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <script src="/supabase-client.js"></script>
  <script src="/auth.js"></script>
  <script src="/topbar.js"></script>
  <script src="/shared-utils.js"></script>
  <script src="/pwa.js"></script>
  <script src="/dashboard-data.js"></script>
  <script src="/dashboard-widgets.js"></script>
  <script>
    (function() {
      var supabase = window.supabaseClient;
      if (!supabase) return;
      supabase.auth.getSession().then(function(result) {
        var session = result.data && result.data.session;
        if (!session) { window.location.href = '/login'; return; }
        document.getElementById('page-wrap').style.display = 'block';
        if (window.DASH_DATA && window.DASH_DATA.init) {
          window.DASH_DATA.init(supabase, session.user);
        }
      });
    })();
  </script>
</body>
</html>
