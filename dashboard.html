<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - StaxAI</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* === CSS VARIABLES === */
:root {
  --header-bg: #4A6D8C;
  --page-bg: #F5F5F5;
  --card-bg: #FFFFFF;
  --card-border: #E0E0E0;
  --body-text: #333333;
  --muted-text: #666666;
  --orange: #C4622A;
  --orange-light: #d4844a;
  --notif-bg: #FFF3CD;
  --notif-text: #856404;
  --topbar-height: 68px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "DM Sans", sans-serif; background: var(--page-bg); color: var(--body-text); min-height: 100vh; padding-top: var(--topbar-height); }
a { text-decoration: none; color: inherit; }
/* === TOPBAR === */
.topbar { position: fixed; top: 0; left: 0; width: 100%; height: var(--topbar-height); background: var(--header-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 1000; }
.topbar-logo img { height: 38px; display: block; }
.topbar-nav { display: flex; align-items: center; gap: 28px; }
.topbar-nav a { font-family: "DM Sans", sans-serif; font-size: 14px; font-weight: 500; color: #FFFFFF; text-decoration: none; transition: opacity 0.2s; }
.topbar-nav a:hover { opacity: 0.8; }
/* === NOTIFICATION BAR === */
.notif-bar { background: var(--notif-bg); border-bottom: 1px solid #f0d060; padding: 0 24px; }
.notif-bar:empty { display: none; }
.notif-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; font-size: 14px; color: var(--notif-text); border-bottom: 1px solid rgba(133,100,4,0.1); }
.notif-item:last-child { border-bottom: none; }
.notif-item a { color: var(--orange); font-weight: 600; text-decoration: underline; }
.notif-dismiss { margin-left: auto; cursor: pointer; opacity: 0.6; font-size: 18px; background: none; border: none; color: var(--notif-text); }
.notif-dismiss:hover { opacity: 1; }
/* === PAGE WRAPPER === */
.page-wrapper { max-width: 1200px; margin: 0 auto; padding: 32px 24px 64px; }
/* === WELCOME === */
.welcome { margin-bottom: 28px; }
.welcome h1 { font-family: "Barlow Condensed", sans-serif; font-size: 32px; font-weight: 800; color: var(--body-text); }
.welcome h1 span { color: var(--orange); }
.welcome p { font-size: 14px; color: var(--muted-text); margin-top: 4px; }
/* === SECTION HEADING === */
.section-heading { font-family: "Barlow Condensed", sans-serif; font-size: 26px; font-weight: 800; color: var(--body-text); margin-bottom: 16px; letter-spacing: 0.01em; }
.section-heading .accent { color: var(--orange); }
/* === ZONE 2: INTELLIGENCE WIDGETS === */
#zone-intelligence { margin-bottom: 40px; }
#zone-intelligence.hidden { display: none; }
.widgets-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
.widget-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 10px; overflow: hidden; }
.widget-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--card-border); }
.widget-header-icon { font-size: 18px; }
.widget-header-title { font-family: "DM Sans", sans-serif; font-size: 14px; font-weight: 700; color: var(--body-text); }
.widget-body { padding: 16px 18px; min-height: 120px; }
.widget-footer { padding: 10px 18px; border-top: 1px solid var(--card-border); display: flex; align-items: center; justify-content: space-between; }
.widget-footer-meta { font-size: 12px; color: var(--muted-text); }
.widget-footer a { font-size: 13px; font-weight: 600; color: var(--orange); }
.widget-loading { color: var(--muted-text); font-size: 14px; padding: 24px 0; text-align: center; }
/* === ZONE 3: YOUR STAX === */
#zone-stax { margin-bottom: 40px; }
.stax-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.stax-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 10px; padding: 20px; display: flex; flex-direction: column; gap: 10px; transition: box-shadow 0.2s; }
.stax-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.stax-card.active { border-color: var(--orange); }
.stax-card.coming-soon { opacity: 0.5; }
.stax-card-icon { font-size: 28px; }
.stax-card-name { font-family: "Barlow Condensed", sans-serif; font-size: 20px; font-weight: 800; color: var(--body-text); }
.stax-card-desc { font-size: 13px; color: var(--muted-text); line-height: 1.5; flex: 1; }
.stax-card-price { font-size: 13px; font-weight: 600; color: var(--muted-text); }
.stax-card-footer { margin-top: auto; }
.btn-open-tool { display: block; width: 100%; padding: 10px; background: var(--orange); color: #fff; border: none; border-radius: 7px; font-family: "DM Sans", sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; text-align: center; }
.btn-open-tool:hover { background: var(--orange-light); }
.btn-activate { display: block; width: 100%; padding: 10px; background: none; color: var(--orange); border: 1px solid var(--orange); border-radius: 7px; font-family: "DM Sans", sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; text-align: center; }
.btn-activate:hover { background: rgba(196,98,42,0.06); }
.badge-live { display: inline-block; background: rgba(196,98,42,0.1); color: var(--orange); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.badge-coming { display: inline-block; background: #f0f0f0; color: var(--muted-text); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
/* === BUSINESS PROFILE PROMPT === */
.profile-prompt { background: var(--notif-bg); border: 1px solid #f0d060; border-radius: 10px; padding: 16px 20px; margin-bottom: 28px; display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--notif-text); }
.profile-prompt a { color: var(--orange); font-weight: 600; text-decoration: underline; }
.profile-prompt.hidden { display: none; }
/* === LOADING STATE === */
.zone-loading { text-align: center; padding: 48px; color: var(--muted-text); font-size: 15px; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--card-border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
/* === RESPONSIVE === */
@media (max-width: 1100px) { .widgets-grid { grid-template-columns: 1fr; } .stax-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .stax-grid { grid-template-columns: 1fr; } .page-wrapper { padding: 20px 16px 48px; } }
</style>
</head>
<body>
<!-- TOPBAR -->
<header class="topbar">
  <a href="dashboard.html" class="topbar-logo">
    <img src="StaxAI Cropped Transparent.png" alt="StaxAI" height="38">
  </a>
  <nav class="topbar-nav">
    <a href="content-library.html">Content Library</a>
  </nav>
</header>
<!-- NOTIFICATION BAR -->
<div class="notif-bar" id="notif-bar"></div>
<!-- PAGE WRAPPER -->
<div class="page-wrapper">
  <!-- BUSINESS PROFILE PROMPT -->
  <div class="profile-prompt hidden" id="profile-prompt">
    ⚠️ Complete your <a href="content-library.html#business-profile">Business Profile</a> so your tools can personalise outputs.
  </div>
  <!-- WELCOME -->
  <div class="welcome">
    <h1>Welcome back, <span id="user-first-name">there</span></h1>
    <p id="welcome-sub"></p>
  </div>
  <!-- ZONE 2: INTELLIGENCE WIDGETS -->
  <div id="zone-intelligence" class="hidden">
    <div class="section-heading">LIVE INTELLIGENCE</div>
    <div class="widgets-grid" id="widgets-grid"></div>
  </div>
  <!-- ZONE 3: YOUR STAX -->
  <div id="zone-stax">
    <div class="section-heading">YOUR <span class="accent">STAX</span></div>
    <div class="stax-grid" id="stax-grid">
      <div class="zone-loading"><div class="spinner"></div>Loading your Stax...</div>
    </div>
  </div>
</div><!-- /page-wrapper -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-client.js"></script>
<script src="./auth.js"></script>
<script>
  // Auth check
  (function() {
    if (typeof supabaseClient !== "undefined") {
      supabaseClient.auth.getUser().then(function(result) {
        if (!result.data.user) { window.location.href = "login.html"; return; }
        var user = result.data.user;
        var firstName = (user.user_metadata && user.user_metadata.full_name)
          ? user.user_metadata.full_name.split(" ")[0]
          : (user.email ? user.email.split("@")[0] : "there");
        var el = document.getElementById("user-first-name");
        if (el) el.textContent = firstName;
      });
    }
  })();
  // Notification bar
  function loadNotifications() {
    // Populated by dashboard-data.js once loaded
  }
  // Dynamic loader
  (function() {
    var s = typeof supabaseClient !== "undefined" ? supabaseClient : null;
    function loadScript(src, cb) {
      var el = document.createElement("script");
      el.src = src + "?v=" + Date.now();
      el.onload = function() { if (cb) cb(); };
      document.body.appendChild(el);
    }
    loadScript("dashboard-data.js", function() {
      if (window.DASH_DATA) window.DASH_DATA.init(s);
    });
    loadScript("dashboard-widgets.js", function() {
      if (window.DASH_WIDGETS) window.DASH_WIDGETS.init(s);
    });
  })();
</script>
</body>
</html>
