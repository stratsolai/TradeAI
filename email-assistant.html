<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json">
  <title>Email Assistant &mdash; StaxAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/staxai-auth.css">
  <style>
    /* -----------------------------------------------------------------------
       Page layout
    ----------------------------------------------------------------------- */
    .ea-page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }
    .ea-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .ea-page-title {
      font-family: var(--heading-font);
      font-size: 36px;
      font-weight: 800;
      color: #1a3a5c;
    }
    .ea-scan-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #ea-scan-btn {
      background: var(--blue);
      color: var(--white);
      border: none;
      font-family: var(--body-font);
      font-size: 15px;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
    }
    #ea-scan-btn:hover { background: #3d5c78; }
    #ea-scan-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* -----------------------------------------------------------------------
       Connection status
    ----------------------------------------------------------------------- */
    #ea-connection-status { margin-bottom: 20px; }
    .ea-connect-prompt {
      background: var(--white);
      border: 1px solid #e2e8f0;
      border-left: 3px solid var(--orange);
      border-radius: 8px;
      padding: 14px 18px;
      color: #475569;
      font-size: 14px;
    }
    .ea-connected-badge {
      display: inline-block;
      background: rgba(26,84,144,0.10);
      border: 1px solid rgba(26,84,144,0.25);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #1a3a5c;
    }

    /* -----------------------------------------------------------------------
       Category tabs
    ----------------------------------------------------------------------- */
    #ea-category-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .ea-tab {
      background: var(--white);
      border-width: 1px 1px 1px 4px;
      border-style: solid;
      border-color: #e0e0e0 #e0e0e0 #e0e0e0 #1A5490;
      border-radius: 10px;
      color: var(--text);
      font-family: var(--body-font);
      font-size: 13px;
      font-weight: 600;
      padding: 10px 16px;
      cursor: pointer;
      transition: opacity 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      white-space: nowrap;
    }
    .ea-tab:hover { opacity: 0.85; }
    .ea-tab.active { font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
    .ea-tab[data-category="all"]    { border-left-color: #1A5490; }
    .ea-tab[data-category="urgent"]    { border-left-color: var(--orange); }
    .ea-tab[data-category="leads"]     { border-left-color: var(--green); }
    .ea-tab[data-category="enquiries"] { border-left-color: var(--purple); }
    .ea-tab[data-category="jobs"]      { border-left-color: var(--teal); }
    .ea-tab[data-category="invoices"]  { border-left-color: #e8500a; }
    .ea-tab[data-category="suppliers"] { border-left-color: #1A5490; }
    .ea-tab[data-category="low"]       { border-left-color: #64748b; }

    /* -----------------------------------------------------------------------
       Error message
    ----------------------------------------------------------------------- */
    #ea-error-msg {
      display: none;
      background: rgba(196,98,42,0.15);
      border: 1px solid rgba(196,98,42,0.35);
      border-radius: 8px;
      padding: 12px 16px;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      margin-bottom: 16px;
    }
    /* -----------------------------------------------------------------------
       Email feed
    ----------------------------------------------------------------------- */
    #ea-email-feed { display: flex; flex-direction: column; gap: 12px; }
    .ea-empty {
      background: var(--white);
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 40px 24px;
      text-align: center;
      color: #64748b;
      font-size: 15px;
    }
    .ea-card {
      background: var(--white);
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 18px 20px;
      transition: border-color 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .ea-card-linked { cursor: pointer; }
    .ea-card-linked:hover { border-color: rgba(196,98,42,0.50); box-shadow: 0 2px 8px rgba(196,98,42,0.12); }
    .ea-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .ea-sender { display: flex; flex-direction: column; gap: 2px; }
    .ea-sender-name { font-weight: 700; font-size: 14px; color: #1a3a5c; }
    .ea-sender-email { font-size: 12px; color: #64748b; }
    .ea-card-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .ea-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
      background: #e8f0f8;
      color: #1a3a5c;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .ea-badge-urgent { background: rgba(196,98,42,0.15); color: var(--orange); }
    .ea-time { font-size: 12px; color: #64748b; }
    .ea-subject { font-weight: 600; font-size: 15px; color: #1a3a5c; margin-bottom: 8px; }
    .ea-summary { font-size: 14px; color: #475569; line-height: 1.55; margin-bottom: 12px; }
    .ea-card-footer { display: flex; align-items: center; justify-content: space-between; }
    .ea-handled-btn {
      background: none;
      border: 1px solid #cbd5e1;
      color: #64748b;
      font-family: var(--body-font);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .ea-handled-btn:hover { border-color: #94a3b8; color: #1a3a5c; }
    .ea-open-hint { font-size: 12px; color: var(--orange); }

    /* -----------------------------------------------------------------------
       Email detail view
    ----------------------------------------------------------------------- */
    .ea-detail {
      background: var(--white);
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .ea-detail-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 12px;
    }
    .ea-detail-back-btn {
      background: none;
      border: 1px solid #cbd5e1;
      color: var(--text);
      font-family: var(--body-font);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
    }
    .ea-detail-back-btn:hover { border-color: #94a3b8; }
    .ea-detail-open-btn {
      display: inline-block;
      background: var(--blue);
      color: var(--white);
      font-family: var(--body-font);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 6px;
      text-decoration: none;
    }
    .ea-detail-open-btn:hover { background: #3d5c78; }
    .ea-detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .ea-detail-subject {
      font-weight: 700;
      font-size: 18px;
      color: #1a3a5c;
      margin-bottom: 12px;
    }
    .ea-detail-summary {
      font-size: 14px;
      color: #475569;
      line-height: 1.55;
      margin-bottom: 16px;
      padding: 12px 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
    }
    .ea-detail-body {
      font-size: 14px;
      color: var(--text);
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      padding: 16px;
      background: #fafbfc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      max-height: 500px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    .ea-detail-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* -----------------------------------------------------------------------
       Responsive
    ----------------------------------------------------------------------- */
    @media (max-width: 600px) {
      .ea-page { padding: 20px 16px 48px; }
      .ea-page-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <a href="/" class="topbar-logo">
      <img src="/StaxAI Cropped Transparent.png" alt="StaxAI">
    </a>
    <div class="topbar-nav">
      <a href="/dashboard">Dashboard</a>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-right">
      <a class="topbar-nav-link" href="/email/settings">Settings</a>
      <div class="topbar-account-wrap">
        <button class="account-btn" id="account-btn"><span id="account-email-short">Account</span> &#9662;</button>
        <div class="account-dropdown" id="account-dropdown">
          <a href="/account" class="account-dropdown-item">Account Management</a>
          <button class="account-dropdown-item" id="sign-out-btn">Sign out</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main page -->
  <div class="ea-page">
    <div class="ea-page-header">
      <h1 class="ea-page-title">Email Assistant</h1>
      <div class="ea-scan-row">
        <button id="ea-scan-btn">Scan Now</button>
      </div>
    </div>
    <div id="ea-connection-status"></div>
    <div id="ea-error-msg"></div>
    <div id="ea-category-tabs"></div>
    <div id="ea-email-feed">
      <div class="ea-empty">Connect your email and tap Scan Now to get started.</div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-client.js"></script>
  <script src="/auth.js"></script>
  <script src="/topbar.js"></script>
  <script src="/pwa.js"></script>
  <script src="/email-assistant-logic.js?v=2"></script>

</body>
</html>
