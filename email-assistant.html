<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json">
  <title>Email Assistant &mdash; StaxAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d1628;
      --bg2:          #172035;
      --bg3:          #1e2d47;
      --bg4:          #253554;
      --card-border:  rgba(255,255,255,0.07);
      --blue:         #1A5490;
      --orange:       #c4622a;
      --orange-light: #d4844a;
      --muted:        rgba(255,255,255,0.70);
      --topbar-auth:  #4A6D8C;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
    }

    /* -----------------------------------------------------------------------
       Authenticated topbar — matches /library exactly
    ----------------------------------------------------------------------- */
    .topbar {
      height: 68px;
      background: linear-gradient(90deg, #deeef8 0%, #4A6D8C 320px, #4A6D8C 100%);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      justify-content: space-between;
    }
    .topbar-logo img {
      height: 38px;
      display: block;
    }
    .topbar-nav {
      margin-left: 64px;
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .topbar-nav a {
      color: rgba(255,255,255,0.75);
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
    }
    .topbar-nav a:hover { color: #fff; }
    nav.topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
    }
    #settings-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.75);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 0;
      cursor: pointer;
      transition: color 0.2s;
    }
    #settings-btn:hover { color: #fff; }
    .topbar-nav-link { color: rgba(255,255,255,0.75); font-size: 16px; font-weight: 600; text-decoration: none; }
    .topbar-nav-link:hover { color: #fff; }
        .account-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.75);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .account-btn:hover { color: #fff; }
    .account-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px 0;
      min-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .account-dropdown.open { display: block; }
    .account-dropdown-email {
      padding: 4px 16px 12px;
      color: #64748b;
      font-size: 13px;
      border-bottom: 1px solid #e2e8f0;
      margin-bottom: 8px;
    }
    .sign-out-btn {
      display: block;
      width: 100%;
      padding: 8px 16px;
      background: none;
      border: none;
      color: #475569;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }
    .sign-out-btn:hover { color: #1a3a5c; background: #f8fafc; }
    /* -----------------------------------------------------------------------
       Page layout
    ----------------------------------------------------------------------- */
    .ea-page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }
    .ea-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .ea-page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: #1a3a5c;
    }
    .ea-scan-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #ea-scan-btn {
      background: #4A6D8C;
      color: #fff;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
    }
    #ea-scan-btn:hover { background: #3d5c78; }
    #ea-scan-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* -----------------------------------------------------------------------
       Connection status
    ----------------------------------------------------------------------- */
    #ea-connection-status { margin-bottom: 20px; }
    .ea-connect-prompt {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-left: 3px solid var(--orange);
      border-radius: 8px;
      padding: 14px 18px;
      color: #475569;
      font-size: 14px;
    }
    .ea-connected-badge {
      display: inline-block;
      background: rgba(26,84,144,0.10);
      border: 1px solid rgba(26,84,144,0.25);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #1a3a5c;
    }

    /* -----------------------------------------------------------------------
       Category tabs
    ----------------------------------------------------------------------- */
    #ea-category-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .ea-tab {
      background: #fff;
      border-width: 1px 1px 1px 4px;
      border-style: solid;
      border-color: #e0e0e0 #e0e0e0 #e0e0e0 #1A5490;
      border-radius: 10px;
      color: #333;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 16px;
      cursor: pointer;
      transition: opacity 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      white-space: nowrap;
    }
    .ea-tab:hover { opacity: 0.85; }
    .ea-tab.active { font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
    .ea-tab[data-category="all"]    { border-left-color: #1A5490; }
    .ea-tab[data-category="urgent"]    { border-left-color: #c4622a; }
    .ea-tab[data-category="leads"]     { border-left-color: #28a745; }
    .ea-tab[data-category="enquiries"] { border-left-color: #7b2d8b; }
    .ea-tab[data-category="jobs"]      { border-left-color: #0d9488; }
    .ea-tab[data-category="invoices"]  { border-left-color: #e8500a; }
    .ea-tab[data-category="suppliers"] { border-left-color: #1A5490; }
    .ea-tab[data-category="low"]       { border-left-color: #64748b; }

    /* -----------------------------------------------------------------------
       Error message
    ----------------------------------------------------------------------- */
    #ea-error-msg {
      display: none;
      background: rgba(196,98,42,0.15);
      border: 1px solid rgba(196,98,42,0.35);
      border-radius: 8px;
      padding: 12px 16px;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      margin-bottom: 16px;
    }
    /* -----------------------------------------------------------------------
       Email feed
    ----------------------------------------------------------------------- */
    #ea-email-feed { display: flex; flex-direction: column; gap: 12px; }
    .ea-empty {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 40px 24px;
      text-align: center;
      color: #64748b;
      font-size: 15px;
    }
    .ea-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 18px 20px;
      transition: border-color 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .ea-card-linked { cursor: pointer; }
    .ea-card-linked:hover { border-color: rgba(196,98,42,0.50); box-shadow: 0 2px 8px rgba(196,98,42,0.12); }
    .ea-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .ea-sender { display: flex; flex-direction: column; gap: 2px; }
    .ea-sender-name { font-weight: 700; font-size: 14px; color: #1a3a5c; }
    .ea-sender-email { font-size: 12px; color: #64748b; }
    .ea-card-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .ea-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
      background: #e8f0f8;
      color: #1a3a5c;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .ea-badge-urgent { background: rgba(196,98,42,0.15); color: #c4622a; }
    .ea-time { font-size: 12px; color: #64748b; }
    .ea-subject { font-weight: 600; font-size: 15px; color: #1a3a5c; margin-bottom: 8px; }
    .ea-summary { font-size: 14px; color: #475569; line-height: 1.55; margin-bottom: 12px; }
    .ea-card-footer { display: flex; align-items: center; justify-content: space-between; }
    .ea-handled-btn {
      background: none;
      border: 1px solid #cbd5e1;
      color: #64748b;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .ea-handled-btn:hover { border-color: #94a3b8; color: #1a3a5c; }
    .ea-open-hint { font-size: 12px; color: var(--orange); }
    /* -----------------------------------------------------------------------
       Settings modal
    ----------------------------------------------------------------------- */
    #ea-settings-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.60);
      z-index: 200;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 68px 0 0;
    }
    #ea-settings-modal.open { display: flex; }
    .ea-settings-panel {
      background: #fff;
      border-left: 1px solid #e2e8f0;
      width: 100%;
      max-width: 420px;
      height: calc(100vh - 68px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .ea-settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
    }
    .ea-settings-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: #1a3a5c; }
    #ea-settings-close { background: none; border: none; color: #94a3b8; font-size: 22px; cursor: pointer; line-height: 1; }
    #ea-settings-close:hover { color: #1a3a5c; }
    #ea-settings-body { padding: 24px; flex: 1; }
    .ea-settings-section { margin-bottom: 28px; }
    .ea-settings-heading {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }
    .ea-setting-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .ea-text-input {
      flex: 1;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      color: #1a3a5c;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 8px 12px;
    }
    .ea-text-input:focus { outline: none; border-color: var(--orange); }
    .ea-select {
      width: 100%;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      color: #1a3a5c;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 8px 12px;
    }
    .ea-select:focus { outline: none; border-color: var(--orange); }
    .ea-toggle-row { display: flex; align-items: center; justify-content: space-between; font-size: 14px; color: #475569; }
    .ea-toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
    .ea-toggle input { opacity: 0; width: 0; height: 0; }
    .ea-toggle-slider {
      position: absolute;
      inset: 0;
      background: #cbd5e1;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .ea-toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .ea-toggle input:checked + .ea-toggle-slider { background: var(--orange); }
    .ea-toggle input:checked + .ea-toggle-slider::before { transform: translateX(18px); }
    .ea-connect-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .ea-btn-connect {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #475569;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 6px;
      text-decoration: none;
      display: inline-block;
    }
    .ea-btn-connect:hover { border-color: #94a3b8; color: #1a3a5c; }
    .ea-btn-primary {
      background: #4A6D8C;
      color: #fff;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
    }
    .ea-btn-primary:hover { background: #3d5c78; }
    .ea-btn-secondary {
      background: #f8fafc;
      color: #475569;
      border: 1px solid #e2e8f0;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }
    .ea-btn-secondary:hover { border-color: #94a3b8; color: #1a3a5c; }
    .ea-settings-actions { display: flex; gap: 10px; padding-top: 16px; border-top: 1px solid #e2e8f0; }
    .ea-connection-detail { margin-bottom: 12px; }

    /* -----------------------------------------------------------------------
       Responsive
    ----------------------------------------------------------------------- */
    @media (max-width: 600px) {
      .ea-page { padding: 20px 16px 48px; }
      .ea-page-header { flex-direction: column; align-items: flex-start; }
      .ea-settings-panel { max-width: 100%; }
      .topbar { padding: 0 16px; }
    }
  </style>
</head>
<body>

  <!-- Topbar — matches /library exactly -->
  <div class="topbar">
    <a href="/" class="topbar-logo">
      <img src="StaxAI Cropped Transparent.png" alt="StaxAI" />
    </a>
    <div class="topbar-nav">
      <a href="/dashboard">Dashboard</a>
    </div>
    <nav class="topbar-right">
 <a class="topbar-nav-link" href="/email/settings">Settings</a>
      <button class="account-btn" id="account-btn">
        Account &#9660;
      </button>
      <div class="account-dropdown" id="account-dropdown">
        <div class="account-dropdown-email" id="account-dropdown-email"></div>
        <a href="/account" class="account-dropdown-item">Account Management</a>
        <button class="account-dropdown-item" id="sign-out-btn">Sign out</button>
      </div>
    </nav>
  </div>

  <!-- Main page -->
  <div class="ea-page">
    <div class="ea-page-header">
      <h1 class="ea-page-title">Email Assistant</h1>
      <div class="ea-scan-row">
        <button id="ea-scan-btn">Scan Now</button>
      </div>
    </div>
    <div id="ea-connection-status"></div>
    <div id="ea-error-msg"></div>
    <div id="ea-category-tabs"></div>
    <div id="ea-email-feed">
      <div class="ea-empty">Connect your email and tap Scan Now to get started.</div>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="ea-settings-modal">
    <div class="ea-settings-panel">
      <div class="ea-settings-header">
        <span class="ea-settings-title">Settings</span>
        <button id="ea-settings-close">&times;</button>
      </div>
      <div id="ea-settings-body"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-client.js"></script>
  <script src="/auth.js"></script>
  <script src="/pwa.js"></script>
  <script src="/email-assistant-logic.js?v=2"></script>

</body>
</html>
