<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<title>Email Assistant &mdash; StaxAI</title>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/staxai-auth.css">
<style>
    .stat-card[data-stat="unhandled"],
    .stat-card[data-stat="urgent"] { cursor: pointer; }

    /* ─── EA STATUS / CATEGORY PILLS ─── */
    .ea-status-row { display:flex; gap:var(--btn-radius); padding:var(--card-padding-mobile) 0; align-items:center; }
    /* EA status button variants — border colours per pill type */
    .status-btn[data-pill="all"]       { border-left-color:var(--blue); }
    .status-btn[data-pill="urgent"]    { border-left-color:var(--red); }
    .status-btn[data-pill="flagged"]   { border-left-color:var(--orange); }
    .status-btn[data-pill="handled"]   { border-left-color:var(--grey-accent); }

    /* ─── FILTER BUTTONS ROW (matches CL .review-filter-btns-row) ─── */
    .filter-btns-row { display:flex; align-items:center; gap:var(--btn-radius); padding:0 0 var(--actions-gap) 0; }

    /* ─── FILTER EXPAND ROW (matches CL .review-filter-row) ─── */
    .ea-filter-expand-row { margin-bottom:var(--actions-gap); }
    .ea-pill-row { display:flex; flex-wrap:wrap; gap:var(--btn-radius); margin-bottom:var(--btn-radius); align-items:center; }
    .ptab-static { cursor:default; }
    .ea-date-input { width:140px; padding:var(--btn-radius) var(--actions-gap); border:var(--input-border-width) solid var(--border); border-radius:var(--btn-radius); font-size:var(--label-font-size); font-family:var(--body-font); background:var(--white); color:var(--text); box-sizing:border-box; }
    .ea-date-input:focus { outline:none; border-color:var(--blue); }
    .ea-date-label { font-size:var(--badge-font-size); font-weight:var(--font-weight-semibold); color:var(--text-muted); }

    /* ─── SEARCH (in status row, right-aligned — matches CL) ─── */
    .ea-search-input {
      width:240px; max-width:240px; margin-left:auto; padding:var(--input-padding); border:var(--input-border-width) solid var(--border);
      border-radius:var(--btn-radius); font-size:var(--btn-font-size); font-family:var(--body-font);
      box-sizing:border-box; background:var(--white); color:var(--text);
    }
    .ea-search-input:focus { outline:none; border-color:var(--blue); }

    /* ─── BULK BAR ─── */
    .ea-bulk-bar {
      display:flex; align-items:center; gap:var(--actions-gap); flex-wrap:wrap;
      background:var(--bg); border:1px solid var(--border); border-radius:var(--btn-radius);
      padding:var(--input-padding); margin-bottom:var(--card-padding-mobile);
    }
    .ea-bulk-label { font-size:var(--label-font-size); color:var(--text-secondary); }

    /* ─── EMAIL LIST ─── */
    .ea-list { display:flex; flex-direction:column; gap:var(--actions-gap); }

    /* ─── EMAIL CARD ─── */
    .ea-flag-btn { background:none; border:none; cursor:pointer; font-size:var(--stat-value-font-size); line-height:1; padding:4px; flex-shrink:0; transition:opacity var(--btn-transition); }
    .ea-flag-btn:hover { opacity:0.7; }

    /* Flag/star feature hidden — pending decision on Mail.ReadWrite scope.
       OAuth is read-only (Mail.Read / gmail.readonly) so write-back to the
       provider would 403. Restore by removing this block. */
    .ea-flag-btn,
    .status-btn[data-pill="flagged"] { display: none !important; }
    .ea-sender-name { font-size:var(--section-title-font-size); font-weight:var(--font-weight-semibold); color:var(--text); flex:1; min-width:100px; }
    .ea-subject-inline { font-size:var(--section-title-font-size); font-weight:var(--font-weight-semibold); color:var(--text); min-width:0; flex:1; }
    /* ─── DETAIL VIEW ─── */
    .ea-detail {
      background:var(--white); border:1px solid var(--border);
      border-radius:var(--card-radius); border-left:4px solid var(--blue);
      padding:24px; box-shadow:0 2px 8px var(--shadow-card);
    }
    .ea-detail-topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:var(--actions-gap); }
    .ea-detail-subject { font-weight:var(--heading-lg-weight); font-size:18px; color:var(--text); margin-bottom:var(--actions-gap); }
    .ea-detail-summary { font-size:var(--btn-font-size); color:var(--text-secondary); line-height:var(--note-line-height); margin-bottom:var(--card-padding-mobile); padding:var(--actions-gap) 14px; background:var(--bg-subtle); border:1px solid var(--border); border-radius:var(--btn-radius); }
    .ea-detail-body { font-size:var(--btn-font-size); color:var(--text); line-height:var(--body-line-height); white-space:pre-wrap; word-break:break-word; padding:var(--card-padding-mobile); background:var(--bg-subtle); border:1px solid var(--border); border-radius:var(--btn-radius); max-height:500px; overflow-y:auto; margin-bottom:var(--card-padding-mobile); }
    .ea-detail-footer { display:flex; align-items:center; justify-content:space-between; gap:var(--actions-gap); flex-wrap:wrap; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .ea-status-row { flex-wrap: wrap; }
      .filter-btns-row { flex-wrap: wrap; }
      .ea-search-input { width: 100%; max-width: 100%; margin-left: 0; font-size: var(--input-font-size-mobile); }
      .ea-date-input { width: 100%; }
      .ea-detail { padding: var(--card-padding-mobile); }
      .ea-detail-body { max-height: 60vh; }
      .ea-detail-topbar { flex-wrap: wrap; }
      .ea-sender-name { min-width: 0; }
      .text-preview { font-size: var(--body-font-size); }
      .lookback-dropdown-field { font-size: var(--input-font-size-mobile); }

      /* ─── MOBILE TAP TARGETS (44px minimum) ─── */
      .status-btn { min-height: 44px; }
      .filter-btn,
      .clear-filters-btn,
      .source-btn { min-height: 44px; }
      .filter-pill { min-height: 44px; padding-top: 13px; padding-bottom: 13px; }
      .btn-dismiss,
      .ea-unmark-btn { min-height: 44px; }
      .ea-flag-btn { min-height: 44px; min-width: 44px; padding: 11px; }
      .item-checkbox { min-width: 44px; min-height: 44px; }
      .lookback-dropdown { min-height: 44px; padding-top: 14px; padding-bottom: 14px; }
      .btn-outline { min-height: 44px; }
      .btn-back { min-height: 44px; }

      /* ─── MOBILE FONT SIZE (13px minimum) ─── */
      .item-upload-date,
      .ea-date-label,
      .ea-date,
      .filter-section-label,
      .section-head-label,
      .lookback-dropdown,
      .lookback-dropdown-item,
      .ea-source-badge,
      .ea-category-badge { font-size: var(--label-font-size); }
    }
</style>
</head>
<body>

<nav class="topbar">
  <a href="/" class="topbar-logo">
    <img src="/StaxAI Cropped Transparent.png" alt="StaxAI">
  </a>
  <div class="topbar-nav"><a href="/dashboard">Dashboard</a></div>
  <div class="topbar-spacer"></div>
  <div class="topbar-right">
    <a href="/email/settings" class="topbar-nav-link">Settings</a>
    <div class="topbar-account-wrap">
      <button class="account-btn" id="account-btn"><span id="account-email-short">Account</span> &#9662;</button>
      <div class="account-dropdown" id="account-dropdown">
        <a href="/account" class="account-dropdown-item">Account Management</a>
        <button class="account-dropdown-item" id="sign-out-btn">Sign out</button>
      </div>
    </div>
  </div>
</nav>

<div id="page-wrap" style="display:none">
<div class="tool-container">
  <div class="page-header">
    <h1 class="page-title">Email Assistant</h1>
    <p class="page-subtitle">Your Gmail and Outlook inbox &mdash; summarised and organised.</p>
  </div>

  <div class="stats-bar">
    <div class="stat-card" data-stat="total"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total Emails</div></div>
    <div class="stat-card green" data-stat="unhandled"><div class="stat-value" id="stat-unhandled">0</div><div class="stat-label">Unhandled</div></div>
    <div class="stat-card red" data-stat="urgent"><div class="stat-value" id="stat-urgent">0</div><div class="stat-label">Urgent</div></div>
  </div>

  <div id="ea-account-tabs" class="tab-nav"></div>
  <div id="ea-account-panels"></div>
</div>
</div>

<!-- Modal feedback container — used by shared-utils showModalError
     when a flag/scan action fails. Required because shared-utils
     looks up .save-msg and silently no-ops when missing. -->
<div class="save-msg" id="ea-msg">
  <div class="save-msg-card">
    <div class="save-msg-text"></div>
    <button type="button" class="save-msg-ok">OK</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<script src="/supabase-client.js"></script>
<script src="/auth.js"></script>
<script src="/topbar.js"></script>
<script src="/sidebar.js"></script>
<script src="/shared-utils.js"></script>
<script src="/pwa.js"></script>
<script src="/email-assistant-logic.js?v=3"></script>

</body>
</html>
