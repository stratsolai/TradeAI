<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeAI Pro — Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1A5490; --blue-dark: #0f3460; --blue-light: #2471a3;
      --orange: #E8500A; --orange-light: #ff6b2b;
      --bg: #0d1628; --bg2: #111d35;
      --card-border: rgba(255,255,255,0.16);
      --muted: rgba(255,255,255,0.72);
      --heading-font: 'Barlow Condensed', sans-serif;
      --body-font: 'DM Sans', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--body-font); background: var(--bg); color: #fff;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
    }
    .bg-grid {
      position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image: linear-gradient(rgba(26,84,144,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(26,84,144,0.1) 1px, transparent 1px);
      background-size:60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }
    .orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; animation: orbFloat 12s ease-in-out infinite; }
    .orb-1 { width:500px; height:500px; background:rgba(26,84,144,0.2); top:-150px; right:-100px; }
    .orb-2 { width:350px; height:350px; background:rgba(232,80,10,0.12); bottom:-80px; left:5%; animation-delay:-4s; }
    @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(15px,-20px)} }

    .page-wrap { position:relative; z-index:1; width:100%; max-width:440px; padding:24px; }

    .logo-wrap { text-align:center; margin-bottom:32px; }
    .logo-wrap img { height:40px; width:auto; }

    .auth-card {
      background:var(--bg2); border:1px solid var(--card-border);
      border-radius:20px; padding:36px;
      box-shadow:0 24px 80px rgba(0,0,0,0.4);
    }
    .card-icon { font-size:40px; text-align:center; margin-bottom:16px; }
    .card-title {
      font-family:var(--heading-font); font-size:32px; font-weight:900;
      text-align:center; margin-bottom:8px;
    }
    .card-sub {
      font-size:14px; color:var(--muted); text-align:center;
      line-height:1.6; margin-bottom:28px;
    }

    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-size:13px; font-weight:600; color:rgba(255,255,255,0.85); margin-bottom:7px; }
    .form-group input {
      width:100%; padding:12px 16px;
      background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.16);
      border-radius:8px; color:white; font-family:var(--body-font); font-size:15px;
      transition:all 0.2s; outline:none;
    }
    .form-group input::placeholder { color:rgba(255,255,255,0.35); }
    .form-group input:focus { border-color:var(--blue-light); background:rgba(255,255,255,0.1); box-shadow:0 0 0 3px rgba(26,84,144,0.25); }

    .btn-submit {
      width:100%; padding:14px; background:var(--orange); color:white;
      border:none; border-radius:8px; font-family:var(--body-font); font-size:16px; font-weight:700;
      cursor:pointer; transition:all 0.25s; position:relative; overflow:hidden;
    }
    .btn-submit::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent); }
    .btn-submit:hover { background:var(--orange-light); transform:translateY(-1px); box-shadow:0 8px 30px rgba(232,80,10,0.4); }

    .form-msg { padding:11px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
    .form-msg.error { background:rgba(220,50,50,0.15); border:1px solid rgba(220,50,50,0.3); color:#ff8a8a; }
    .form-msg.success { background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.3); color:#6ee7b7; }

    .back-link { text-align:center; margin-top:22px; }
    .back-link a { font-size:13px; color:var(--muted); text-decoration:none; transition:color 0.2s; }
    .back-link a:hover { color:white; }

    /* Sent state */
    .sent-state { display:none; text-align:center; }
    .sent-icon { font-size:52px; margin-bottom:16px; }
    .sent-title { font-family:var(--heading-font); font-size:28px; font-weight:900; margin-bottom:10px; }
    .sent-sub { font-size:14px; color:var(--muted); line-height:1.7; margin-bottom:24px; }
    .btn-secondary {
      display:inline-block; padding:12px 28px;
      background:rgba(255,255,255,0.08); color:white;
      border:1px solid rgba(255,255,255,0.2); border-radius:8px;
      font-family:var(--body-font); font-size:14px; font-weight:600;
      text-decoration:none; transition:all 0.2s;
    }
    .btn-secondary:hover { background:rgba(255,255,255,0.13); }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="page-wrap">

  <div class="logo-wrap">
    <a href="/index.html"><img src="/logo.svg" alt="TradeAI Pro"></a>
  </div>

  <div class="auth-card">

    <!-- Request form -->
    <div id="request-form">
      <div class="card-icon">🔑</div>
      <div class="card-title">Forgot your password?</div>
      <div class="card-sub">No worries. Enter your email address and we'll send you a link to reset your password.</div>

      <div class="form-msg error" id="fp-error"></div>

      <div class="form-group">
        <label for="fp-email">Email address</label>
        <input type="email" id="fp-email" placeholder="you@yourbusiness.com.au" autocomplete="email">
      </div>

      <button class="btn-submit" onclick="handleForgot()">Send Reset Link →</button>
    </div>

    <!-- Sent confirmation -->
    <div class="sent-state" id="sent-state">
      <div class="sent-icon">📬</div>
      <div class="sent-title">Check your inbox</div>
      <div class="sent-sub">
        We've sent a password reset link to <strong id="sent-email"></strong>.<br>
        Check your inbox (and your spam folder just in case).<br><br>
        The link will expire in 30 minutes.
      </div>
      <a href="/login.html" class="btn-secondary">← Back to Log In</a>
    </div>

  </div>

  <div class="back-link">
    <a href="/login.html">← Back to Log In</a>
  </div>

</div>

<script>
  function handleForgot() {
    const el = document.getElementById('fp-error');
    el.style.display = 'none';
    const email = document.getElementById('fp-email').value.trim();
    if (!email || !email.includes('@')) {
      el.textContent = 'Please enter a valid email address.';
      el.className = 'form-msg error';
      el.style.display = 'block';
      return;
    }
    // Connect to auth system here — send reset email
    document.getElementById('request-form').style.display = 'none';
    document.getElementById('sent-email').textContent = email;
    document.getElementById('sent-state').style.display = 'block';
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleForgot();
  });
</script>

</body>
</html>
