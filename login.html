<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a5490">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="/pwa.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StaxAI — Log In / Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1A5490;
      --blue-dark: #0f3460;
      --blue-light: #2471a3;
      --orange: #E8500A;
      --orange-light: #ff6b2b;
      --bg: #0d1628;
      --bg2: #111d35;
      --card-border: rgba(255,255,255,0.16);
      --muted: rgba(255,255,255,0.72);
      --body-font: 'DM Sans', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--body-font);
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Background */
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
    }
    .bg-grid {
      position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image: linear-gradient(rgba(26,84,144,0.1) 1px,transparent 1px), linear-gradient(90deg,rgba(26,84,144,0.1) 1px,transparent 1px);
      background-size:60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }
    .orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; animation:orbFloat 12s ease-in-out infinite; }
    .orb-1 { width:500px; height:500px; background:rgba(26,84,144,0.2); top:-150px; right:-100px; }
    .orb-2 { width:350px; height:350px; background:rgba(232,80,10,0.12); bottom:-80px; left:5%; animation-delay:-4s; }
    @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(15px,-20px)} }

    /* Card */
    .container {
      position: relative; z-index: 1;
      background: var(--bg2);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 40px;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }

    /* Logo */
    .logo { text-align:center; margin-bottom:32px; }
    .logo img { height:40px; width:auto; }
    .logo p { color:var(--muted); font-size:13px; margin-top:8px; }

    /* Tabs */
    .tabs {
      display:flex; gap:0;
      background:rgba(255,255,255,0.06);
      border-radius:10px; padding:4px;
      margin-bottom:30px; border:none;
    }
    .tab {
      flex:1; padding:10px 16px; border:none; border-radius:8px;
      font-family:var(--body-font); font-size:14px; font-weight:600;
      cursor:pointer; transition:all 0.2s; background:transparent; color:var(--muted);
    }
    .tab.active { background:var(--orange); color:white; box-shadow:0 4px 16px rgba(232,80,10,0.35); }
    .tab:not(.active):hover { color:white; background:rgba(255,255,255,0.08); }

    /* Form */
    .form-group { margin-bottom:18px; }
    label { display:block; font-size:13px; font-weight:600; color:rgba(255,255,255,0.85); margin-bottom:7px; }
    input, select {
      width:100%; padding:12px 16px;
      background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.16);
      border-radius:8px; color:white; font-family:var(--body-font); font-size:15px;
      transition:all 0.2s; outline:none; -webkit-appearance:none;
    }
    input::placeholder { color:rgba(255,255,255,0.35); }
    input:focus, select:focus {
      border-color:var(--blue-light); background:rgba(255,255,255,0.1);
      box-shadow:0 0 0 3px rgba(26,84,144,0.25);
    }
    select option { background:#1a2a4a; color:white; }

    /* Forgot link */
    .forgot-row { display:flex; justify-content:flex-end; margin-top:-10px; margin-bottom:18px; }
    .forgot-link { font-size:13px; color:var(--orange); text-decoration:none; font-weight:500; transition:color 0.2s; }
    .forgot-link:hover { color:var(--orange-light); text-decoration:underline; }

    /* Button */
    .btn {
      width:100%; padding:14px; background:var(--orange); color:white;
      border:none; border-radius:8px; font-family:var(--body-font); font-size:16px; font-weight:700;
      cursor:pointer; transition:all 0.25s; position:relative; overflow:hidden;
    }
    .btn::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent); }
    .btn:hover { background:var(--orange-light); transform:translateY(-1px); box-shadow:0 8px 30px rgba(232,80,10,0.4); }

    /* Messages */
    .error {
      background:rgba(220,50,50,0.15); border:1px solid rgba(220,50,50,0.3);
      color:#ff8a8a; padding:11px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none;
    }
    .success {
      background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.3);
      color:#6ee7b7; padding:11px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none;
    }

    #signup-form { display:none; }

    /* Terms */
    .terms-note { font-size:12px; color:rgba(255,255,255,0.4); text-align:center; margin-top:16px; line-height:1.6; }
    .terms-note a { color:rgba(255,255,255,0.6); text-decoration:underline; }
    .terms-note a:hover { color:white; }

    /* Below card */
    .trust-row {
      position:relative; z-index:1;
      display:flex; justify-content:center; gap:20px;
      margin-top:22px; flex-wrap:wrap;
    }
    .trust-item { display:flex; align-items:center; gap:6px; font-size:12px; color:rgba(255,255,255,0.45); }
    .trust-item::before { content:'✓'; color:var(--orange); font-weight:700; }
    .back-home { position:relative; z-index:1; text-align:center; margin-top:14px; }
    .back-home a { font-size:13px; color:var(--muted); text-decoration:none; transition:color 0.2s; }
    .back-home a:hover { color:white; }

    @media(max-width:480px) { .container { padding:28px 20px; } }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">

  <div class="logo">
    <a href="/"><img src="/logo.svg" alt="StaxAI"></a>
    <p>Enterprise AI for Australian trades</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showLogin()">Log In</button>
    <button class="tab" onclick="showSignup()">Sign Up</button>
  </div>

  <div class="error" id="error-message"></div>
  <div class="success" id="success-message"></div>

  <!-- Login Form -->
  <form id="login-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@yourbusiness.com.au" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter your password" required>
    </div>
    <div class="forgot-row">
      <a href="/forgot-password" class="forgot-link">Forgot password?</a>
    </div>
    <button type="submit" class="btn">Log In →</button>
  </form>

  <!-- Signup Form -->
  <form id="signup-form">
    <div class="form-group">
      <label>Business Name</label>
      <input type="text" id="signup-business" placeholder="Your business name" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@yourbusiness.com.au" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min. 6 characters" required minlength="6">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="tel" id="signup-phone" placeholder="04xx xxx xxx" required>
    </div>
    <div class="form-group">
      <label>Industry</label>
      <select id="signup-industry" required>
        <option value="">Select your industry</option>
        <option value="pool">Pool Building</option>
        <option value="hvac">HVAC &amp; Refrigeration</option>
        <option value="electrical">Electrical Contracting</option>
        <option value="fabrication">Metal Fabrication</option>
        <option value="plumbing">Plumbing</option>
        <option value="construction">Construction</option>
        <option value="landscaping">Landscaping</option>
        <option value="cleaning">Commercial Cleaning</option>
        <option value="manufacturing">Manufacturing</option>
        <option value="concreting">Concreting</option>
        <option value="handyman">Handyman Services</option>
      </select>
    </div>
    <button type="submit" class="btn">Create Account →</button>
    <div class="terms-note">
      By signing up you agree to our
      <a href="/terms">Terms of Service</a> and
      <a href="/privacy">Privacy Policy</a>
    </div>
  </form>

</div>

<div class="trust-row">
  <div class="trust-item">From $50/month per tool</div>
  <div class="trust-item">Cancel anytime</div>
  <div class="trust-item">Australian support</div>
</div>
<div class="back-home">
  <a href="/">← Back to StaxAI</a>
</div>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Our Supabase client -->
<script src="/supabase-client.js"></script>
<!-- Our auth functions -->
<script src="/auth.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", async function() {
    var params = new URLSearchParams(window.location.search);
    if (params.get("tab") === "signup") showSignup();

    // Store trial context from URL params into sessionStorage
    var toolParam = params.get("tool");
    var tierParam = params.get("tier");
    var toolsParam = params.get("tools");
    if (toolParam) sessionStorage.setItem("trial_tool", toolParam);
    if (tierParam) sessionStorage.setItem("trial_tier", tierParam);
    if (toolsParam) sessionStorage.setItem("trial_tools", toolsParam);

    // Handle login --- unchanged from original
    document.getElementById("login-form").addEventListener("submit", async function(e) {
      e.preventDefault();
      hideMessages();
      var email = document.getElementById("login-email").value;
      var password = document.getElementById("login-password").value;
      var result = await signIn(email, password);
      if (result.success) {
        window.location.href = "//dashboard";
      } else {
        showError(result.error || "Login failed. Please check your credentials.");
      }
    });

    // Handle signup
    document.getElementById("signup-form").addEventListener("submit", async function(e) {
      e.preventDefault();
      hideMessages();
      var email = document.getElementById("signup-email").value;
      var password = document.getElementById("signup-password").value;
      var businessName = document.getElementById("signup-business").value;
      var phone = document.getElementById("signup-phone").value;
      var industry = document.getElementById("signup-industry").value;
      var result = await signUp(email, password, businessName, phone, industry);
      if (result.success) {
        // Write trial activation to Supabase profiles
        var trialTool = sessionStorage.getItem("trial_tool");
        var trialTier = sessionStorage.getItem("trial_tier");
        var trialTools = sessionStorage.getItem("trial_tools");
        var userId = result.data && result.data.user ? result.data.user.id : null;
        var activatedTools = [];
        var bundleTier = null;
        if (trialTool) {
          activatedTools = [trialTool];
          bundleTier = null;
        } else if (trialTier === "stax-all") {
          activatedTools = ["chatbot","social","email","strategic-plan","news-digest","bi","tender","quote-enhancer","swms","customer-updates","handover-docs","review-booster","design-viz"];
          bundleTier = "stax-all";
        } else if (trialTier && trialTools) {
          activatedTools = trialTools.split(",");
          bundleTier = trialTier;
        }
        if (activatedTools.length > 0 && userId) {
          var trialExpiresAt = new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString();
          await window.supabaseClient.from("profiles").upsert({
            id: userId,
            activated_tools: activatedTools,
            trial_expires_at: trialExpiresAt,
            bundle_tier: bundleTier,
            is_trial: true,
            trial_used: true
          });
        }
        showSuccess("Account created. Please check your email to verify your account.");
        var redirectParam = trialTool ? "?activated=" + trialTool : (trialTier ? "?tier=" + trialTier : "");
        setTimeout(function() { window.location.href = "//dashboard" + redirectParam; }, 2000);
      } else {
        showError(result.error || "Signup failed. Please try again.");
      }
    });
  });
</script>

</body>
</html>
