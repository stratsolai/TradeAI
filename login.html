<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a5490">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="/pwa.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TradeAI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f8fafb 0%, #e8f1f8 50%, #dce9f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      max-width: 450px;
      width: 100%;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-size: 32px;
      color: #1a5490;
      margin-bottom: 8px;
    }

    .logo p {
      color: #4a9fd8;
      font-size: 16px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #e5e5e5;
    }

    .tab {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }

    .tab.active {
      color: #1a5490;
      border-bottom-color: #e8500a;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #1a5490;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #1a5490;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #144070;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .success {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    #signup-form {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>TradeAI</h1>
      <p>AI Tools for SME Trades</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showLogin()">Login</button>
      <button class="tab" onclick="showSignup()">Sign Up</button>
    </div>

    <div class="error" id="error-message"></div>
    <div class="success" id="success-message"></div>

    <!-- Login Form -->
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" required>
      </div>
      <button type="submit" class="btn">Log In</button>
    </form>

    <!-- Signup Form -->
    <form id="signup-form">
      <div class="form-group">
        <label>Business Name</label>
        <input type="text" id="signup-business" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" required minlength="6">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="signup-phone" required>
      </div>
      <div class="form-group">
        <label>Industry</label>
        <select id="signup-industry" required>
          <option value="">Select your industry</option>
          <option value="pool">Pool Building</option>
          <option value="hvac">HVAC & Refrigeration</option>
          <option value="electrical">Electrical Contracting</option>
          <option value="fabrication">Metal Fabrication</option>
          <option value="plumbing">Plumbing</option>
          <option value="construction">Construction</option>
          <option value="landscaping">Landscaping</option>
          <option value="cleaning">Commercial Cleaning</option>
          <option value="manufacturing">Manufacturing</option>
          <option value="concreting">Concreting</option>
          <option value="handyman">Handyman Services</option>
        </select>
      </div>
      <button type="submit" class="btn">Create Account</button>
    </form>
  </div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Our Supabase client -->
  <script src="/supabase-client.js"></script>
  
  <!-- Our auth functions -->
  <script src="/auth.js"></script>

  <script>
    // Tab switching
    function showLogin() {
      document.getElementById('login-form').style.display = 'block';
      document.getElementById('signup-form').style.display = 'none';
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.querySelectorAll('.tab')[1].classList.remove('active');
      hideMessages();
    }

    function showSignup() {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('signup-form').style.display = 'block';
      document.querySelectorAll('.tab')[0].classList.remove('active');
      document.querySelectorAll('.tab')[1].classList.add('active');
      hideMessages();
    }

    function showError(message) {
      const errorEl = document.getElementById('error-message');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }

    function showSuccess(message) {
      const successEl = document.getElementById('success-message');
      successEl.textContent = message;
      successEl.style.display = 'block';
    }

    function hideMessages() {
      document.getElementById('error-message').style.display = 'none';
      document.getElementById('success-message').style.display = 'none';
    }

    // Handle login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      const result = await signIn(email, password);

      if (result.success) {
        window.location.href = '/dashboard.html';
      } else {
        showError(result.error || 'Login failed. Please check your credentials.');
      }
    });

    // Handle signup
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const businessName = document.getElementById('signup-business').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const phone = document.getElementById('signup-phone').value;
      const industry = document.getElementById('signup-industry').value;

      const result = await signUp(email, password, businessName, phone, industry);

      if (result.success) {
        showSuccess('Account created! Please check your email to verify your account.');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 2000);
      } else {
        showError(result.error || 'Signup failed. Please try again.');
      }
    });

    // Check if already logged in
    checkAuth().then(session => {
      if (session) {
        window.location.href = '/dashboard.html';
      }
    });
  </script>
</body>
</html>
