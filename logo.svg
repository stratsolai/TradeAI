<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <defs>
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8500A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B2B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A5490;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2471A3;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon mark: hexagon (industrial/trades) with circuit-style AI bolt -->
  <!-- Hexagon background -->
  <polygon points="30,4 52,17 52,43 30,56 8,43 8,17" fill="url(#icon-grad)" />
  <!-- Inner hexagon outline -->
  <polygon points="30,10 47,20 47,40 30,50 13,40 13,20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Lightning bolt / AI symbol inside hex -->
  <path d="M34,14 L24,32 L30,32 L26,46 L38,28 L31,28 Z" fill="url(#bolt-grad)" />
  <!-- Circuit dot accents -->
  <circle cx="18" cy="30" r="1.5" fill="rgba(255,255,255,0.5)" />
  <circle cx="42" cy="30" r="1.5" fill="rgba(255,255,255,0.5)" />
  <line x1="19.5" y1="30" x2="24" y2="30" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="38" y1="30" x2="40.5" y2="30" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Wordmark: Trade -->
  <text x="64" y="38"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-weight="900"
    font-size="26"
    letter-spacing="-0.5"
    fill="#1A5490">Trade</text>

  <!-- Wordmark: AI in orange -->
  <text x="152" y="38"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-weight="900"
    font-size="26"
    letter-spacing="-0.5"
    fill="#E8500A">AI</text>

  <!-- Tagline -->
  <text x="64" y="51"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="8.5"
    letter-spacing="2.5"
    fill="#888888">BY STRATEGIC SOLUTIONS</text>
</svg>
