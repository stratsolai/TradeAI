<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5490"/>
      <stop offset="100%" style="stop-color:#1a6ab0"/>
    </linearGradient>
  </defs>

  <!-- Hexagon icon -->
  <polygon points="30,4 52,16 52,44 30,56 8,44 8,16" fill="url(#hexGrad)"/>
  <!-- Lightning bolt -->
  <polygon points="33,14 24,32 29,32 27,46 36,28 31,28" fill="#e8500a"/>

  <!-- "Trade" wordmark -->
  <text x="64" y="38" font-family="Arial, sans-serif" font-weight="800" font-size="26" fill="#1a5490" letter-spacing="-0.5">Trade</text>
  <!-- "AI" in orange -->
  <text x="138" y="38" font-family="Arial, sans-serif" font-weight="800" font-size="26" fill="#e8500a" letter-spacing="-0.5">AI</text>
  <!-- "Pro" in a lighter blue/grey -->
  <text x="165" y="38" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#4a7ab5" letter-spacing="-0.5"> Pro</text>

  <!-- Tagline -->
  <text x="64" y="52" font-family="Arial, sans-serif" font-weight="400" font-size="8.5" fill="#94a3b8" letter-spacing="2">BY STRATEGIC SOLUTIONS</text>
</svg>
