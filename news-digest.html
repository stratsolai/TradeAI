<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Industry News &amp; Updates Digest &mdash; StaxAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "DM Sans", sans-serif;
      background: #F5F7FA;
      color: #333333;
      min-height: 100vh;
    }

    .topbar {
      height: 68px;
      background: #4A6D8C;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .topbar-logo { display: flex; align-items: center; }
    .topbar-logo img { height: 38px; display: block; }
    .topbar-back {
      color: rgba(255,255,255,0.75);
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .topbar-back:hover { color: #fff; }
    .topbar-nav { margin-left: 64px; display: flex; align-items: center; gap: 28px; margin-right: auto; }
    .topbar-nav a { font-family: "DM Sans", sans-serif; font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.75); text-decoration: none; transition: color 0.2s; }
    .topbar-nav a:hover { color: #fff; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 24px; }
    .topbar-account { position: relative; }
    .topbar-account-btn { background: none; border: none; color: rgba(255,255,255,0.75); font-family: "DM Sans", sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .topbar-account-btn:hover { color: #fff; }
    .topbar-settings-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.75);
      font-family: "DM Sans", sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 0;
      cursor: pointer;
      transition: color 0.2s;
    }
    .topbar-settings-btn:hover { color: #fff; }
    .account-dropdown { position: relative; }
    
    .topbar-account { position: relative; }
    .account-dropdown { display: none; position: absolute; right: 0; top: calc(100% + 8px); background: #fff; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); min-width: 200px; overflow: hidden; z-index: 200; }
    .account-dropdown.open { display: block; }
    .account-dropdown-email { padding: 12px 16px; font-size: 13px; color: #888; border-bottom: 1px solid #f0f0f0; }
    .account-dropdown-item { display: block; width: 100%; padding: 11px 16px; background: none; border: none; text-align: left; font-family: "DM Sans", sans-serif; font-size: 14px; color: #333; cursor: pointer; transition: background 0.15s; }
    .account-dropdown-item:hover { background: #f5f5f5; }
    .account-btn:hover { color: #fff; }
    .account-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      min-width: 180px;
      overflow: hidden;
      z-index: 200;
    }
    .account-dropdown.open { display: block; }
    .account-dropdown-email {
      padding: 12px 16px;
      font-size: 13px;
      color: #888;
      border-bottom: 1px solid #f0f0f0;
    }
    .account-dropdown-item {
      display: block;
      width: 100%;
      padding: 11px 16px;
      background: none;
      border: none;
      text-align: left;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      color: #333;
      cursor: pointer;
      transition: background 0.15s;
    }
    .account-dropdown-item:hover { background: #f5f5f5; }

    .nd-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }
    .nd-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .nd-page-title {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #1A3A5C;
    }
    .nd-refresh-btn {
      background: #C4622A;
      color: #fff;
      border: none;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 9px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .nd-refresh-btn:hover { background: #a8521f; }

    .nd-tab-bar-wrap {
      background: #fff;
      border-radius: 12px 12px 0 0;
      border-bottom: 2px solid #e8edf2;
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nd-tab-bar-wrap::-webkit-scrollbar { display: none; }
    #nd-tab-bar { display: flex; }
    .nd-tab {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      padding: 14px 20px;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .nd-tab:hover { color: #333; }
    .nd-tab.active { color: #C4622A; border-bottom-color: #C4622A; }

    .nd-panels {
      background: #fff;
      border-radius: 0 0 12px 12px;
      min-height: 400px;
      padding: 28px;
    }

    .nd-summary-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .nd-last-updated { font-size: 13px; color: #888; }
    .nd-summary-section {
      border-left: 4px solid #1A5490;
      padding: 14px 18px;
      margin-bottom: 20px;
      background: #f8fafc;
      border-radius: 0 8px 8px 0;
    }
    .nd-summary-cat-heading {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #1A3A5C;
      margin-bottom: 6px;
    }
    .nd-summary-text {
      font-size: 14px;
      line-height: 1.7;
      color: #444;
      margin-bottom: 10px;
    }
    .nd-read-more {
      font-size: 13px;
      font-weight: 600;
      color: #C4622A;
      text-decoration: none;
    }
    .nd-read-more:hover { text-decoration: underline; }

    .nd-card {
      background: #fff;
      border-radius: 12px;
      border-left: 4px solid #1A5490;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .nd-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .nd-card-title {
      font-size: 15px;
      font-weight: 700;
      color: #1A3A5C;
      text-decoration: none;
      line-height: 1.4;
      flex: 1;
    }
    a.nd-card-title:hover { color: #C4622A; text-decoration: underline; }
    .nd-bookmark {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #ccc;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.2s;
    }
    .nd-bookmark.saved { color: #C4622A; }
    .nd-bookmark:hover { color: #C4622A; }
    .nd-card-summary {
      font-size: 14px;
      line-height: 1.7;
      color: #555;
      margin-bottom: 12px;
    }
    .nd-card-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
    }
    .nd-source-name { font-weight: 600; color: #444; }
    .nd-source-domain { color: #888; }
    .nd-pub-date { color: #aaa; }
    .nd-badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .nd-badge-primary { background: rgba(34,197,94,0.12); color: #16a34a; }
    .nd-badge-secondary { background: rgba(156,163,175,0.2); color: #6b7280; }
    .nd-badge-email { background: rgba(59,130,246,0.12); color: #2563eb; }

    .nd-empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #888;
    }
    .nd-empty-state p { margin-bottom: 12px; font-size: 15px; line-height: 1.6; }
    .nd-empty-state strong { color: #444; }

    .nd-btn-primary {
      background: #C4622A;
      color: #fff;
      border: none;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .nd-btn-primary:hover { background: #a8521f; }
    .nd-btn-secondary {
      background: #f0f4f8;
      color: #1A5490;
      border: 1px solid #d0dae6;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .nd-btn-secondary:hover { background: #dde8f4; }

    #nd-settings-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .nd-modal-box {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .nd-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid #eee;
    }
    .nd-modal-header h2 {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #1A3A5C;
    }
    .nd-modal-close {
      background: none;
      border: none;
      font-size: 22px;
      color: #aaa;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }
    .nd-modal-close:hover { color: #333; }
    #nd-settings-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    .nd-settings-section { margin-bottom: 24px; }
    .nd-settings-section h4 {
      font-size: 13px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .nd-settings-cat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .nd-cat-label {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      color: #333;
    }
    .nd-cat-remove {
      background: none;
      border: 1px solid #e0e0e0;
      color: #aaa;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    .nd-cat-remove:hover { color: #c44; border-color: #c44; }
    .nd-toggle {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .nd-toggle input { opacity: 0; width: 0; height: 0; }
    .nd-toggle-slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .nd-toggle-slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .nd-toggle input:checked + .nd-toggle-slider { background: #C4622A; }
    .nd-toggle input:checked + .nd-toggle-slider::before { transform: translateX(16px); }
    .nd-settings-section label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 14px;
      color: #333;
      cursor: pointer;
    }
    #nd-source-prefs, #nd-industry-override, #nd-location-override {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      color: #333;
      margin-bottom: 12px;
    }
    .nd-modal-footer {
      padding: 16px 24px;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    @media (max-width: 600px) {
      .nd-page { padding: 20px 16px 48px; }
      .nd-page-title { font-size: 26px; }
      .nd-tab { padding: 12px 14px; font-size: 13px; }
      .nd-panels { padding: 18px 16px; }
    }
  </style>
</head>
<body>

      <div class="topbar">
    <a href="/index.html" class="topbar-logo">
      <img src="/StaxAI Cropped Transparent.png" alt="StaxAI">
    </a>
    <div class="topbar-nav"><a id="back-btn" href="/dashboard.html" class="topbar-back">Dashboard</a></div>
    <nav class="topbar-right">
      <a class="topbar-nav-link" href="news-digest-settings.html">Settings</a>
      <div class="topbar-account" id="account-menu">
        <button class="topbar-account-btn" id="account-btn"><span id="account-email-short">Account</span> &#9662;</button>
        <div class="account-dropdown" id="account-dropdown">
          <div class="account-dropdown-email" id="account-dropdown-email">&#8212;</div>
                    <a href="/account.html" class="account-dropdown-item">Account Management</a>
          <button class="account-dropdown-item" id="sign-out-btn">Sign out</button>
        </div>
      </div>
    </nav>
  </div>

  <div class="nd-page">
    <div class="nd-page-header">
      <h1 class="nd-page-title">Industry News &amp; Updates</h1>
      <button class="nd-refresh-btn" onclick="window.ND_LOGIC.refreshNews()">Refresh Now</button>
    </div>

    <div class="nd-tab-bar-wrap">
      <div id="nd-tab-bar"></div>
    </div>

    <div class="nd-panels">
      <div id="nd-panel-summary">
        <div class="nd-empty-state"><p>Loading your digest...</p></div>
      </div>
      <div id="nd-panel-feed" style="display:none;"></div>
    </div>
  </div>

  <div id="nd-settings-modal" role="dialog" aria-modal="true" aria-labelledby="nd-modal-title">
    <div class="nd-modal-box">
      <div class="nd-modal-header">
        <h2 id="nd-modal-title">Digest Settings</h2>
        <button class="nd-modal-close" onclick="window.ND_LOGIC.closeSettings()" aria-label="Close">&times;</button>
      </div>
      <div id="nd-settings-body"></div>
      <div class="nd-modal-footer">
        <button class="nd-btn-secondary" onclick="window.ND_LOGIC.closeSettings()">Cancel</button>
        <button class="nd-btn-primary" onclick="window.ND_LOGIC.saveSettings()">Save Settings</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-client.js"></script>
  <script src="/auth.js"></script>
  <script src="/pwa.js"></script>
  <script src="/news-digest-logic.js?v=1"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (window.supabaseClient) {
        window.supabaseClient.auth.getSession().then(function (result) {
          var session = result.data && result.data.session;
          if (session && session.user) {
            var email = session.user.email || "";
            var shortEl = document.getElementById("account-email-short");
            var dropEmailEl = document.getElementById("account-dropdown-email");
            if (shortEl) shortEl.textContent = email.split('@')[0];
            if (dropEmailEl) dropEmailEl.textContent = email;
          }
        });
      }
      var accountBtn = document.getElementById("account-btn");
      var accountDropdown = document.getElementById("account-dropdown");
      if (accountBtn && accountDropdown) {
        accountBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          accountDropdown.classList.toggle("open");
        });
        document.addEventListener("click", function () {
          accountDropdown.classList.remove("open");
        });
      }
      var signOutBtn = document.getElementById("sign-out-btn");
      if (signOutBtn) {
        signOutBtn.addEventListener("click", function () {
          if (window.supabaseClient) {
            window.supabaseClient.auth.signOut().then(function () {
              window.location.href = "/login.html";
            });
          }
        });
      }
      if (window.ND_LOGIC) {
        window.ND_LOGIC.init();
      }
    });
  </script>

</body>
</html>
