<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <title>Industry News &amp; Updates Digest &mdash; StaxAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/staxai-auth.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "DM Sans", sans-serif;
      background: #F5F7FA;
      color: #333333;
      min-height: 100vh;
    }

    .nd-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }
    .nd-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .nd-page-title {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #1A3A5C;
    }
    .nd-refresh-btn {
      background: #C4622A;
      color: #fff;
      border: none;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 9px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .nd-refresh-btn:hover { background: #a8521f; }

    .nd-tab-bar-wrap {
      background: #fff;
      border-radius: 12px 12px 0 0;
      border-bottom: 2px solid #e8edf2;
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nd-tab-bar-wrap::-webkit-scrollbar { display: none; }
    #nd-tab-bar { display: flex; }
    .nd-tab {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      padding: 14px 20px;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .nd-tab:hover { color: #333; }
    .nd-tab.active { color: #C4622A; border-bottom-color: #C4622A; }

    .nd-panels {
      background: #fff;
      border-radius: 0 0 12px 12px;
      min-height: 400px;
      padding: 28px;
    }

    .nd-summary-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .nd-last-updated { font-size: 13px; color: #888; }
    .nd-summary-section {
      border-left: 4px solid #1A5490;
      padding: 14px 18px;
      margin-bottom: 20px;
      background: #f8fafc;
      border-radius: 0 8px 8px 0;
    }
    .nd-summary-cat-heading {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #1A3A5C;
      margin-bottom: 6px;
    }
    .nd-summary-text {
      font-size: 14px;
      line-height: 1.7;
      color: #444;
      margin-bottom: 10px;
    }
    .nd-read-more {
      font-size: 13px;
      font-weight: 600;
      color: #C4622A;
      text-decoration: none;
    }
    .nd-read-more:hover { text-decoration: underline; }

    .nd-card {
      background: #fff;
      border-radius: 12px;
      border-left: 4px solid #1A5490;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .nd-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .nd-card-title {
      font-size: 15px;
      font-weight: 700;
      color: #1A3A5C;
      text-decoration: none;
      line-height: 1.4;
      flex: 1;
    }
    a.nd-card-title:hover { color: #C4622A; text-decoration: underline; }
    .nd-bookmark {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #ccc;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.2s;
    }
    .nd-bookmark.saved { color: #C4622A; }
    .nd-bookmark:hover { color: #C4622A; }
    .nd-card-summary {
      font-size: 14px;
      line-height: 1.7;
      color: #555;
      margin-bottom: 12px;
    }
    .nd-card-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
    }
    .nd-source-name { font-weight: 600; color: #444; }
    .nd-source-domain { color: #888; }
    .nd-pub-date { color: #aaa; }
    .nd-badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .nd-badge-primary { background: rgba(34,197,94,0.12); color: #16a34a; }
    .nd-badge-secondary { background: rgba(156,163,175,0.2); color: #6b7280; }
    .nd-badge-email { background: rgba(59,130,246,0.12); color: #2563eb; }

    .nd-empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #888;
    }
    .nd-empty-state p { margin-bottom: 12px; font-size: 15px; line-height: 1.6; }
    .nd-empty-state strong { color: #444; }

    .nd-btn-primary {
      background: #C4622A;
      color: #fff;
      border: none;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .nd-btn-primary:hover { background: #a8521f; }
    .nd-btn-secondary {
      background: #f0f4f8;
      color: #1A5490;
      border: 1px solid #d0dae6;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .nd-btn-secondary:hover { background: #dde8f4; }

    @media (max-width: 600px) {
      .nd-page { padding: 20px 16px 48px; }
      .nd-page-title { font-size: 26px; }
      .nd-tab { padding: 12px 14px; font-size: 13px; }
      .nd-panels { padding: 18px 16px; }
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <a href="/" class="topbar-logo">
      <img src="/StaxAI Cropped Transparent.png" alt="StaxAI">
    </a>
    <div class="topbar-nav"><a href="/dashboard">Dashboard</a></div>
    <div class="topbar-spacer"></div>
    <div class="topbar-right">
      <a href="/news/settings" class="topbar-nav-link">Settings</a>
      <div class="topbar-account-wrap">
        <button class="account-btn" id="account-btn"><span id="account-email-short">Account</span> &#9662;</button>
        <div class="account-dropdown" id="account-dropdown">
          <a href="/account" class="account-dropdown-item">Account Management</a>
          <button class="account-dropdown-item" id="sign-out-btn">Sign out</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="nd-page">
    <div class="nd-page-header">
      <h1 class="nd-page-title">Industry News &amp; Updates</h1>
      <button class="nd-refresh-btn" onclick="window.ND_LOGIC.refreshNews()">Refresh Now</button>
    </div>

    <div class="nd-tab-bar-wrap">
      <div id="nd-tab-bar"></div>
    </div>

    <div class="nd-panels">
      <div id="nd-panel-summary">
        <div class="nd-empty-state"><p>Loading your digest...</p></div>
      </div>
      <div id="nd-panel-feed" style="display:none;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-client.js"></script>
  <script src="/auth.js"></script>
  <script src="/topbar.js"></script>
  <script src="/shared-utils.js"></script>
  <script src="/pwa.js"></script>
  <script src="/news-digest-logic.js?v=1"></script>
  <script>
    (function() {
      var supabase = window.supabaseClient;
      if (!supabase) return;
      supabase.auth.getSession().then(function(result) {
        var session = result.data && result.data.session;
        if (!session) { window.location.href = '/login'; return; }
        if (window.ND_LOGIC && window.ND_LOGIC.init) {
          window.ND_LOGIC.init();
        }
      });
    })();
  </script>

</body>
</html>
