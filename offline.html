<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a5490">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="/pwa.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — TradeAI</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 28px; color: #1a5490; margin-bottom: 12px; }
    p { color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: #1a5490;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .note {
      margin-top: 24px;
      padding: 16px;
      background: #fff3cd;
      border-radius: 10px;
      font-size: 14px;
      color: #856404;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📵</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Some features require connectivity but your queued photos will upload automatically when you're back online.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
    <div class="note">
      💡 <strong>Tip:</strong> Any photos you took while offline have been saved and will upload automatically when your connection is restored.
    </div>
  </div>
</body>
</html>
