<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — TradeAI Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-client.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1a5490;
      --accent:  #e8500a;
      --bg:      #f0f4f8;
      --white:   #ffffff;
      --text:    #1e293b;
      --muted:   #64748b;
      --border:  #e2e8f0;
      --error:   #dc2626;
      --success: #16a34a;
    }

    body {
      font-family: 'DM Sans', Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .logo-hex {
      width: 44px; height: 44px;
    }
    .logo-text { line-height: 1; }
    .logo-text .wordmark {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .logo-text .wordmark span.trade { color: var(--primary); }
    .logo-text .wordmark span.ai    { color: var(--accent); }
    .logo-text .wordmark span.pro   { color: #4a7ab5; font-size: 18px; }
    .logo-text .tagline {
      font-size: 8px;
      letter-spacing: 2px;
      color: #94a3b8;
      text-transform: uppercase;
      margin-top: 2px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--white);
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Password strength */
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin-top: -12px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: -12px;
      margin-bottom: 20px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover  { background: #154070; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }

    .message {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      display: none;
    }
    .message.error   { background: #fef2f2; color: var(--error);   border: 1px solid #fecaca; display: block; }
    .message.success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; display: block; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--primary); }

    /* Expired / invalid token state */
    .invalid-token {
      text-align: center;
      display: none;
    }
    .invalid-token .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .invalid-token p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .btn-outline {
      display: block;
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-outline:hover { background: var(--primary); color: var(--white); }
  </style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <svg class="logo-hex" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
      <polygon points="30,4 52,16 52,44 30,56 8,44 8,16" fill="#1a5490"/>
      <polygon points="33,14 24,32 29,32 27,46 36,28 31,28" fill="#e8500a"/>
    </svg>
    <div class="logo-text">
      <div class="wordmark">
        <span class="trade">Trade</span><span class="ai">AI</span><span class="pro"> Pro</span>
      </div>
      <div class="tagline">By Strategic Solutions</div>
    </div>
  </div>

  <!-- Invalid / expired token view -->
  <div class="invalid-token" id="invalidView">
    <div class="icon">🔐</div>
    <h1>Link Expired</h1>
    <p>This password reset link has expired or has already been used. Please request a new one from the login page.</p>
    <a href="/login.html" class="btn-outline">Back to Login</a>
  </div>

  <!-- Reset form -->
  <div id="resetForm">
    <h1>Set New Password</h1>
    <p class="subtitle">Choose a strong password for your TradeAI Pro account.</p>

    <label for="password">New Password</label>
    <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-label" id="strengthLabel"></div>

    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Repeat your new password" autocomplete="new-password">

    <button class="btn" id="submitBtn" onclick="handleReset()">Update Password</button>

    <div class="message" id="message"></div>

    <a href="/login.html" class="back-link">← Back to login</a>
  </div>

</div>

<script>
  // ── Check for valid session from reset link ──────────────────────────────
  // Supabase puts the tokens in the URL hash when coming from a reset email
  async function init() {
    const hash = window.location.hash;
    const params = new URLSearchParams(window.location.search);

    // Supabase v2 reset links use the hash fragment
    if (hash && hash.includes('access_token')) {
      // Supabase auth will pick this up automatically via onAuthStateChange
      const { data, error } = await window.supabaseClient.auth.getSession();
      if (error || !data.session) {
        showInvalidToken();
      }
    } else if (!hash && !params.get('code')) {
      // No token at all — someone navigated here directly
      showInvalidToken();
    }

    // Also handle PKCE flow (Supabase v2 newer versions use ?code=)
    if (params.get('code')) {
      const { error } = await window.supabaseClient.auth.exchangeCodeForSession(params.get('code'));
      if (error) showInvalidToken();
    }
  }

  function showInvalidToken() {
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('invalidView').style.display = 'block';
  }

  // ── Password strength meter ───────────────────────────────────────────────
  document.getElementById('password').addEventListener('input', function() {
    const val = this.value;
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');

    let score = 0;
    if (val.length >= 8)  score++;
    if (val.length >= 12) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { pct: 0,   color: '#e2e8f0', text: '' },
      { pct: 20,  color: '#ef4444', text: 'Too short' },
      { pct: 40,  color: '#f97316', text: 'Weak' },
      { pct: 60,  color: '#eab308', text: 'Fair' },
      { pct: 80,  color: '#22c55e', text: 'Good' },
      { pct: 100, color: '#16a34a', text: 'Strong' },
    ];

    const lvl = val.length === 0 ? levels[0] : levels[Math.min(score, 5)];
    fill.style.width = lvl.pct + '%';
    fill.style.background = lvl.color;
    label.textContent = lvl.text;
    label.style.color = lvl.color;
  });

  // ── Submit handler ────────────────────────────────────────────────────────
  async function handleReset() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirmPassword').value;
    const btn      = document.getElementById('submitBtn');
    const msg      = document.getElementById('message');

    msg.className = 'message';
    msg.style.display = 'none';

    if (!password || password.length < 8) {
      showMsg('Password must be at least 8 characters.', 'error');
      return;
    }
    if (password !== confirm) {
      showMsg('Passwords do not match.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating…';

    const { error } = await window.supabaseClient.auth.updateUser({ password });

    if (error) {
      showMsg(error.message || 'Something went wrong. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Update Password';
    } else {
      showMsg('Password updated! Redirecting to login…', 'success');
      btn.textContent = '✓ Done';
      setTimeout(() => {
        window.location.href = '/login.html?reset=success';
      }, 2000);
    }
  }

  function showMsg(text, type) {
    const msg = document.getElementById('message');
    msg.textContent = text;
    msg.className = 'message ' + type;
  }

  // ── Allow Enter key ───────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleReset();
  });

  // ── Initialise ───────────────────────────────────────────────────────────
  init();
</script>

</body>
</html>
