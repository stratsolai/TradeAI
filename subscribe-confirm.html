<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <title>Confirm Your Stax — StaxAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F5F7FA;
      color: #333;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── TOPBAR ── */
    .topbar {
      height: 68px;
      background: #4A6D8C;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo { display: flex; align-items: center; text-decoration: none; }
    .topbar-logo img { height: 38px; }
    .topbar-nav { margin-left: 64px; }
    .topbar-nav a {
      color: rgba(255,255,255,0.75);
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
    }
    .topbar-nav a:hover { color: #fff; }
    .topbar-spacer { flex: 1; }
    .topbar-account { position: relative; }
    .topbar-account-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      color: rgba(255,255,255,0.75);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
    }
    .topbar-account-btn:hover { color: #fff; border-color: rgba(255,255,255,0.6); }
    .topbar-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      min-width: 200px;
      z-index: 200;
    }
    .topbar-dropdown.open { display: block; }
    .topbar-dropdown-email {
      padding: 12px 16px;
      font-size: 13px;
      color: #888;
      border-bottom: 1px solid #f0f0f0;
    }
    .topbar-dropdown-signout {
      display: block;
      width: 100%;
      padding: 12px 16px;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #333;
      text-align: left;
      cursor: pointer;
    }
    .topbar-dropdown-signout:hover { background: #f5f5f5; }

    /* ── PAGE HEADING ── */
    .page-heading {
      text-align: center;
      padding: 40px 24px 24px;
    }
    .page-heading h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 42px;
      font-weight: 900;
      color: #1F3864;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .page-heading p {
      font-size: 16px;
      color: #555;
      max-width: 540px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── PICK BANNER ── */
    .pick-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 14px 24px;
      max-width: 1000px;
      margin: 0 auto 28px;
    }
    .pick-banner-text { font-size: 15px; font-weight: 500; color: #333; }
    .pick-banner-count { font-size: 15px; font-weight: 600; color: #4A6D8C; white-space: nowrap; }
    .pick-count-num { color: #c4622a; }

    /* ── ERROR MESSAGE ── */
    .page-error {
      display: none;
      background: #fdecea;
      border: 1px solid #c0392b;
      border-radius: 8px;
      color: #7a1010;
      font-size: 14px;
      padding: 12px 20px;
      max-width: 1000px;
      margin: 0 auto 20px;
    }
    .page-error.visible { display: block; }

    /* ── TOOL GRID ── */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px;
    }
    @media (max-width: 700px) { .tool-grid { grid-template-columns: 1fr; } }
    @media (min-width: 701px) and (max-width: 960px) { .tool-grid { grid-template-columns: repeat(2, 1fr); } }

    /* ── TOOL CARD ── */
    .tool-card {
      background: #fff;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
      user-select: none;
    }
    .tool-card:hover:not(.disabled) { border-color: #4A6D8C; box-shadow: 0 2px 8px rgba(74,109,140,0.12); }
    .tool-card.selected { border-color: #c4622a; box-shadow: 0 2px 10px rgba(196,98,42,0.15); }
    .tool-card.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }
    .tool-card.at-limit:not(.selected) { opacity: 0.5; pointer-events: none; }

    .tool-card-tick {
      display: none;
      position: absolute;
      top: 12px;
      right: 12px;
      width: 22px;
      height: 22px;
      background: #c4622a;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }
    .tool-card.selected .tool-card-tick { display: flex; }

    .tool-card-icon { font-size: 28px; margin-bottom: 10px; }
    .tool-card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #1F3864;
      margin-bottom: 6px;
    }
    .tool-card-desc { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 10px; }
    .tool-card-price { font-size: 13px; font-weight: 600; color: #c4622a; }
    .tool-card-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      background: #f0f0f0;
      color: #888;
      margin-bottom: 8px;
    }

    /* ── CONFIRM BAR ── */
    .confirm-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }
    .confirm-bar-summary { font-size: 15px; font-weight: 500; color: #333; }
    .confirm-bar-summary span { color: #c4622a; font-weight: 700; }
    .confirm-btn {
      background: #c4622a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .confirm-btn:hover:not(:disabled) { background: #a8521f; }
    .confirm-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <a href="/dashboard.html" class="topbar-logo">
      <img src="StaxAI Cropped Transparent.png" alt="StaxAI">
    </a>
    <nav class="topbar-nav">
      <a href="/dashboard.html">Dashboard</a>
    </nav>
    <div class="topbar-spacer"></div>
    <div class="topbar-account" id="account-menu">
      <button class="topbar-account-btn" id="account-btn" aria-haspopup="true" aria-expanded="false">
        <span id="account-email-short">Account</span> &#9660;
      </button>
      <div class="topbar-dropdown" id="account-dropdown" role="menu">
        <div class="topbar-dropdown-email" id="account-dropdown-email"></div>
        <button class="topbar-dropdown-signout" id="sign-out-btn">Sign Out</button>
      </div>
    </div>
  </header>

  <!-- PAGE HEADING -->
  <div class="page-heading">
    <h1>CONFIRM YOUR STAX</h1>
    <p id="page-subheading">Choose the tools you want to subscribe to. This selection will be locked in when you confirm.</p>
  </div>

  <!-- PICK BANNER -->
  <div class="pick-banner" id="pick-banner">
    <span class="pick-banner-text" id="pick-banner-text">Choose your tools to include in your subscription</span>
    <span class="pick-banner-count"><span class="pick-count-num" id="pick-count">0</span> of <span id="pick-total">0</span> selected</span>
  </div>

  <!-- ERROR MESSAGE -->
  <div class="page-error" id="page-error"></div>

  <!-- TOOL GRID -->
  <div class="tool-grid" id="tool-grid"></div>

  <!-- CONFIRM BAR -->
  <div class="confirm-bar">
    <span class="confirm-bar-summary"><span id="bar-count">0</span> of <span id="bar-total">0</span> tools selected</span>
    <button class="confirm-btn" id="confirm-btn" disabled>Confirm and Subscribe</button>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <script src="supabase-client.js"></script>
  <script src="tools-data.js"></script>
  <script>
    (function() {
      var _tier = null;
      var _slotLimit = 0;
      var _selected = [];
      var _userId = null;

      // ── INIT ────────────────────────────────────────────────────
      async function init() {
        // Auth guard
        var session = await window.supabaseClient.auth.getSession();
        if (!session.data.session) {
          window.location.href = 'login.html';
          return;
        }
        var user = session.data.session.user;
        _userId = user.id;

        // Populate account dropdown
        var email = user.email || '';
        var emailShort = email.split('@')[0];
        document.getElementById('account-email-short').textContent = emailShort;
        document.getElementById('account-dropdown-email').textContent = email;

        // Read tier from URL
        var params = new URLSearchParams(window.location.search);
        _tier = params.get('tier');
        if (_tier !== 'stax3' && _tier !== 'stax6') {
          window.location.href = 'dashboard.html';
          return;
        }
        _slotLimit = _tier === 'stax3' ? 3 : 6;

        // Update UI with slot count
        document.getElementById('page-subheading').textContent =
          'Choose the ' + _slotLimit + ' tools you want to subscribe to. This selection will be locked in when you confirm.';
        document.getElementById('pick-banner-text').textContent =
          'Choose your ' + _slotLimit + ' tools to include in your subscription';
        document.getElementById('pick-total').textContent = _slotLimit;
        document.getElementById('bar-total').textContent = _slotLimit;

        // Load profile — validate trial state and get current activated_tools
        var pr = await window.supabaseClient
          .from('profiles')
          .select('activated_tools, bundle_tier, is_trial')
          .eq('id', _userId)
          .single();

        if (!pr.data) {
          window.location.href = 'dashboard.html';
          return;
        }
        if (!pr.data.is_trial) {
          // Already a paid subscriber — no need to be here
          window.location.href = 'dashboard.html';
          return;
        }
        if (pr.data.bundle_tier !== _tier) {
          // Tier mismatch
          window.location.href = 'dashboard.html';
          return;
        }

        // Pre-populate selected tools from profile
        _selected = Array.isArray(pr.data.activated_tools) ? pr.data.activated_tools.slice() : [];

        // Render tool grid (with hardcoded prices, then upgrade to live
        // prices in place once /api/get-prices responds).
        renderGrid();
        updateCounts();
        _loadLivePrices().then(function(map) {
          var resolved = _resolveLivePrices(map);
          if (resolved) {
            _resolvedPrices = resolved;
            renderGrid();
          }
        });
      }

      // ── LIVE PRICING ────────────────────────────────────────────
      // _resolvedPrices: map of toolId → "$X/mth", or null if any built
      // tool's priceId is missing from /api/get-prices. All-or-nothing.
      var _resolvedPrices = null;

      async function _loadLivePrices() {
        try {
          var r = await fetch('/api/get-prices');
          if (!r.ok) return null;
          var d = await r.json();
          return d && d.prices ? d.prices : null;
        } catch (e) { return null; }
      }

      function _resolveLivePrices(map) {
        if (!map) return null;
        var tools = window.CORE_TOOLS || [];
        var resolved = {};
        for (var i = 0; i < tools.length; i++) {
          var t = tools[i];
          if (t.status !== 'built') continue;
          if (!t.priceId) return null;
          if (!map[t.priceId]) return null;
          resolved[t.id] = map[t.priceId];
        }
        return resolved;
      }

      function _displayPrice(tool) {
        if (_resolvedPrices && _resolvedPrices[tool.id]) return _resolvedPrices[tool.id];
        return (tool.price || '') + '/mth';
      }

      // ── RENDER GRID ─────────────────────────────────────────────
      function renderGrid() {
        var grid = document.getElementById('tool-grid');
        var tools = window.CORE_TOOLS || [];
        grid.innerHTML = '';
        tools.forEach(function(tool) {
          var isSelected = _selected.indexOf(tool.id) !== -1;
          var isPending = tool.status !== 'built';
          var card = document.createElement('div');
          card.className = 'tool-card' +
            (isSelected ? ' selected' : '') +
            (isPending ? ' disabled' : '');
          card.dataset.id = tool.id;

          var titleText = Array.isArray(tool.title) ? tool.title.join(' ') : tool.title;

          card.innerHTML =
            '<div class="tool-card-tick">&#10003;</div>' +
            (isPending ? '<span class="tool-card-badge">Coming Soon</span>' : '') +
            '<div class="tool-card-icon">' + (tool.icon || '') + '</div>' +
            '<div class="tool-card-name">' + titleText + '</div>' +
            '<div class="tool-card-desc">' + (tool.desc || '') + '</div>' +
            '<div class="tool-card-price">' + _displayPrice(tool) + '</div>';

          if (!isPending) {
            card.addEventListener('click', function() { toggleTool(tool.id); });
          }
          grid.appendChild(card);
        });
      }

      // ── TOGGLE TOOL ─────────────────────────────────────────────
      function toggleTool(toolId) {
        var idx = _selected.indexOf(toolId);
        if (idx !== -1) {
          // Deselect
          _selected.splice(idx, 1);
        } else {
          // Select — only if under limit
          if (_selected.length >= _slotLimit) return;
          _selected.push(toolId);
        }
        updateCardStates();
        updateCounts();
      }

      // ── UPDATE CARD STATES ───────────────────────────────────────
      function updateCardStates() {
        var cards = document.querySelectorAll('.tool-card:not(.disabled)');
        var atLimit = _selected.length >= _slotLimit;
        cards.forEach(function(card) {
          var id = card.dataset.id;
          var isSelected = _selected.indexOf(id) !== -1;
          card.classList.toggle('selected', isSelected);
          card.classList.toggle('at-limit', atLimit && !isSelected);
        });
      }

      // ── UPDATE COUNTS ────────────────────────────────────────────
      function updateCounts() {
        var n = _selected.length;
        document.getElementById('pick-count').textContent = n;
        document.getElementById('bar-count').textContent = n;
        var btn = document.getElementById('confirm-btn');
        btn.disabled = n !== _slotLimit;
      }

      // ── CONFIRM & CHECKOUT ───────────────────────────────────────
      document.getElementById('confirm-btn').addEventListener('click', async function() {
        if (_selected.length !== _slotLimit) return;
        var btn = document.getElementById('confirm-btn');
        var errEl = document.getElementById('page-error');
        btn.disabled = true;
        btn.textContent = 'Processing...';
        errEl.classList.remove('visible');

        try {
          // Step 1: Write final tool selection to Supabase
          var updateRes = await window.supabaseClient
            .from('profiles')
            .update({ activated_tools: _selected })
            .eq('id', _userId);

          if (updateRes.error) {
            throw new Error(updateRes.error.message);
          }

          // Step 2: Call create-checkout API
          var checkoutRes = await fetch('/api/create-checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              userId: _userId,
              tier: _tier,
              tools: _selected
            })
          });

          if (!checkoutRes.ok) {
            var errData = await checkoutRes.json();
            throw new Error(errData.error || 'Checkout failed');
          }

          var checkoutData = await checkoutRes.json();
          if (!checkoutData.url) {
            throw new Error('No checkout URL returned');
          }

          // Step 3: Redirect to Stripe
          window.location.href = checkoutData.url;

        } catch (err) {
          errEl.textContent = 'Something went wrong: ' + err.message + '. Please try again.';
          errEl.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Confirm and Subscribe';
        }
      });

      // ── ACCOUNT DROPDOWN ─────────────────────────────────────────
      document.getElementById('account-btn').addEventListener('click', function() {
        var dropdown = document.getElementById('account-dropdown');
        var btn = document.getElementById('account-btn');
        var isOpen = dropdown.classList.contains('open');
        dropdown.classList.toggle('open', !isOpen);
        btn.setAttribute('aria-expanded', String(!isOpen));
      });

      document.addEventListener('click', function(e) {
        var menu = document.getElementById('account-menu');
        if (!menu.contains(e.target)) {
          document.getElementById('account-dropdown').classList.remove('open');
          document.getElementById('account-btn').setAttribute('aria-expanded', 'false');
        }
      });

      document.getElementById('sign-out-btn').addEventListener('click', async function() {
        await window.supabaseClient.auth.signOut();
        window.location.href = 'login.html';
      });

      // ── START ────────────────────────────────────────────────────
      init();
    })();
  </script>
</body>
</html>
